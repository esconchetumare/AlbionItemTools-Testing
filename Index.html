<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Hub - Itemary</title>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --text: #c9d1d9; --border: #30363d; --header-bg: #1c2128;
            --mob-accent: #ff7b72;
        }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh;
        }
        .hub-container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hub-header {
            padding: 30px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        .hub-header h1 { margin: 0; font-size: 1.8rem; color: #fff; letter-spacing: 2px; }
        .hub-header p { margin: 10px 0 0 0; font-size: 0.8rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        
        .file-list { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .file-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: all 0.2s;
        }
        .file-link:hover {
            border-color: var(--accent);
            background: #21262d;
            transform: translateX(5px);
        }
        .file-link.bestiary:hover { border-color: var(--mob-accent); }

        .file-info { display: flex; flex-direction: column; }
        .file-info span { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin-top: 4px; }
        .arrow { color: var(--accent); font-size: 1.2rem; }
        .bestiary .arrow { color: var(--mob-accent); }
    </style>
</head>
<body>

<div class="hub-container">
    <div class="hub-header">
        <h1>PROJECT HUB</h1>
        <p>Asset Management & Tools</p>
    </div>
    
    <div class="file-list">
        <a href="Itemary.html" class="file-link">
            <div class="file-info">
                Itemary Inspector
                <span>Combat Stats & Crafting Calculator</span>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="Bestiary.html" class="file-link bestiary">
            <div class="file-info">
                Bestiary
                <span>Mob Stats & Rank Filtering</span>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>
</div>

</body>
</html>
