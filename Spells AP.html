<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spell Multi-Component & Charge Viewer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f0f2f5; color: #1a1a1b; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .parent-block { border: 2px solid #2d3436; margin-bottom: 40px; border-radius: 10px; overflow: hidden; background: #fff; }
        .parent-title { background: #2d3436; color: #fff; padding: 15px 25px; font-size: 1.6em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-bottom: 4px solid #3498db; }

        .component-box { margin: 15px; border: 1px solid #d1d8e0; border-radius: 8px; background: #fafafa; }
        .component-header { background: #f1f5f9; padding: 10px 15px; font-weight: bold; color: #334155; font-size: 0.95em; border-bottom: 1px solid #d1d8e0; display: flex; justify-content: space-between; }

        .target-section { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; }
        .target-section:last-child { border-bottom: none; }
        .target-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        
        .target-enemy { background: #fee2e2; color: #b91c1c; }
        .target-caster { background: #e0f2fe; color: #0369a1; }
        .target-self { background: #ede9fe; color: #6d28d9; }

        .effect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
        .effect-item { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 6px; position: relative; }
        
        .charge-logic { margin-top: 10px; padding: 8px; background: #fffbeb; border: 1px solid #fef3c7; border-radius: 4px; font-size: 0.85em; }
        .charge-title { color: #92400e; font-weight: bold; font-size: 0.75em; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .charge-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #fef3c7; }
        .charge-row:last-child { border-bottom: none; }
        
        code { color: #e91e63; font-weight: bold; background: #fce4ec; padding: 2px 5px; border-radius: 3px; }
        .source-info { font-size: 0.7em; color: #94a3b8; margin-top: 8px; border-top: 1px dashed #e2e8f0; padding-top: 5px; font-family: monospace; }
        
        .loading-status { padding: 15px; margin-bottom: 20px; border-radius: 8px; display: none; }
        .status-error { background: #fee2e2; color: #b91c1c; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Spell Component & Charge Viewer</h1>
    <div id="statusMessage" class="loading-status"></div>
    <div id="results"></div>
</div>

<script>
    // Configuration
    const FILE_NAME = 'spells.xml';
    const componentSuffixes = /_(MOVESPEEDBUFF|CLEANUP|EFFECT|DAMAGE|HIT|CONDITION|STACK|BUFF|REMOVAL|TRIGGER|PREMULTI_REMOVE|BASE|RAW)\d*$/g;
    const variationWords = /_(SECOND|THIRD|FOURTH|FIFTH|MAX|LOW|MAXDAMAGE|LOWDAMAGE)/g;

    // Auto-fetch on load
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch(FILE_NAME);
            if (!response.ok) throw new Error(`Could not find ${FILE_NAME} on the server.`);
            const text = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(text, "text/xml");
            processData(xmlDoc);
        } catch (error) {
            const status = document.getElementById('statusMessage');
            status.textContent = error.message;
            status.classList.add('status-error');
        }
    });

    function getParentRoot(name) {
        return name.replace(componentSuffixes, '').replace(variationWords, '');
    }

    function getComponentLabel(fullName, parentRoot) {
        let label = fullName.replace(parentRoot, '').replace(/^_/, '');
        return label || "MAIN ACTION";
    }

    function processData(xml) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        const spells = xml.querySelectorAll('activespell, passivespell');
        const hierarchy = {};

        spells.forEach(spell => {
            const fullName = spell.getAttribute('uniquename') || "UNKNOWN";
            const parent = getParentRoot(fullName);
            const component = getComponentLabel(fullName, parent);
            
            if (!hierarchy[parent]) hierarchy[parent] = {};
            if (!hierarchy[parent][component]) hierarchy[parent][component] = {};

            const processElement = (el, type) => {
                const target = el.getAttribute('target') || 'default';
                if (!hierarchy[parent][component][target]) hierarchy[parent][component][target] = [];
                
                let effectData = {
                    type: type,
                    source: fullName,
                    attr: el.getAttribute('attribute') || el.getAttribute('type'),
                    val: el.getAttribute('change') || el.getAttribute('value'),
                    time: el.getAttribute('time'),
                    charges: []
                };

                const chargeScaling = el.querySelector('IfCharge, IfConsumeCharges');
                if (chargeScaling) {
                    const chargeSpell = chargeScaling.getAttribute('chargespell') || chargeScaling.getAttribute('spell');
                    const overrides = chargeScaling.querySelectorAll('change');
                    
                    effectData.charges.push({
                        spell: chargeSpell,
                        items: Array.from(overrides).map(o => ({
                            min: o.getAttribute('mincharges') || 'Consumed',
                            newVal: o.getAttribute('value')
                        }))
                    });
                }
                hierarchy[parent][component][target].push(effectData);
            };

            Array.from(spell.getElementsByTagName('directattributechange')).forEach(el => processElement(el, 'Attribute Change'));
            Array.from(spell.getElementsByTagName('buffovertime')).forEach(el => processElement(el, 'Buff Over Time'));
            
            Array.from(spell.getElementsByTagName('channelingspell')).forEach(chan => {
                Array.from(chan.getElementsByTagName('directattributechange')).forEach(el => processElement(el, 'Channel Effect'));
            });
        });

        Object.keys(hierarchy).sort().forEach(parentName => {
            const components = hierarchy[parentName];
            const block = document.createElement('div');
            block.className = 'parent-block';
            let html = `<div class="parent-title">${parentName}</div>`;

            Object.keys(components).sort().forEach(compName => {
                const targets = components[compName];
                html += `<div class="component-box"><div class="component-header"><span>${compName.replace(/_/g, ' ')}</span></div>`;

                Object.keys(targets).forEach(targetName => {
                    html += `<div class="target-section"><span class="target-badge target-${targetName.toLowerCase()}">${targetName}</span><div class="effect-grid">`;
                    
                    targets[targetName].forEach(e => {
                        const dur = e.time ? ` over <code>${e.time}s</code>` : '';
                        let chargeHtml = '';
                        
                        if (e.charges.length > 0) {
                            e.charges.forEach(c => {
                                chargeHtml += `<div class="charge-logic">
                                    <span class="charge-title">Scaling: ${c.spell}</span>`;
                                c.items.forEach(row => {
                                    chargeHtml += `<div class="charge-row"><span>Charges: ${row.min}</span> <b>${row.newVal}</b></div>`;
                                });
                                chargeHtml += `</div>`;
                            });
                        }

                        html += `
                            <div class="effect-item">
                                <span style="font-size:0.65em; font-weight:900; color:#94a3b8; text-transform:uppercase;">${e.type}</span>
                                <b>${e.attr}</b>: <code>${e.val}</code>${dur}
                                ${chargeHtml}
                                <div class="source-info">XML: ${e.source}</div>
                            </div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div>`;
            });
            block.innerHTML = html;
            resultsDiv.appendChild(block);
        });
    }
</script>

</body>
</html>
