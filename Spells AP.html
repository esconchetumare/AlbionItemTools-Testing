<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spell Multi-Component & Charge Viewer</title>
    <style>
        :root {
            --bg: #1a1b1e;
            --container-bg: #25262b;
            --panel-bg: #2c2e33;
            --text-main: #c1c2c5;
            --text-bright: #ffffff;
            --accent: #f08c00; 
            --border: #373a40;
            --tag-bg: #d9480f;
            --enemy: #c92a2a;
            --caster: #1864ab;
            --self: #5f3dc4;
            --value-gold: #ffca28;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: var(--text-main); }
        .container { max-width: 1200px; margin: auto; background: var(--container-bg); padding: 30px; min-height: 100vh; }

        .search-container {
            position: sticky; top: 0; z-index: 100; background: var(--container-bg);
            padding: 10px 0 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
        }

        #spellSearch {
            width: 100%; padding: 12px 20px; background: var(--panel-bg);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text-bright);
        }

        .parent-block { border: 1px solid var(--border); margin-bottom: 30px; border-radius: 10px; overflow: hidden; background: var(--panel-bg); }
        
        .parent-header {
            background: #141517; padding: 15px 25px; border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
        }
        .parent-title { color: var(--accent); font-size: 1.2em; font-weight: 800; text-transform: uppercase; }
        .parent-summary { font-family: monospace; color: var(--value-gold); font-size: 1.1em; font-weight: bold; }

        .component-box { margin: 15px; border: 1px solid var(--border); border-radius: 8px; background: rgba(0,0,0,0.2); }
        .component-header { background: rgba(255,255,255,0.03); padding: 8px 15px; font-weight: bold; font-size: 0.85em; color: #94a3b8; border-bottom: 1px solid var(--border); }

        .target-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; margin: 8px 15px; }
        .target-enemy { background: #5c0e0e; color: #ff8787; }
        .target-caster { background: #0b2e4f; color: #74c0fc; }

        .effect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; padding: 0 15px 15px 15px; }
        .effect-item { background: var(--panel-bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; font-size: 0.9em; }
        
        .charge-logic { margin-top: 8px; padding: 6px; background: #2d2412; border: 1px solid #4d3d1a; border-radius: 4px; font-size: 0.8em; }
        .charge-row { display: flex; justify-content: space-between; padding: 1px 0; }
        
        code { color: var(--value-gold); font-weight: bold; background: rgba(255, 202, 40, 0.1); padding: 1px 4px; border-radius: 3px; }
        .source-info { font-size: 0.65em; color: #5c5f66; margin-top: 5px; font-family: monospace; }
        
        #sentinel { height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <h1 style="color: var(--text-bright); margin: 0 0 10px 0; font-size: 1.2rem;">Spell Inspector (Compact)</h1>
        <input type="text" id="spellSearch" placeholder="Search spells...">
    </div>
    <div id="results"></div>
    <div id="sentinel"></div>
</div>

<script>
    const FILE_NAME = 'spells.xml';
    const componentKeywords = ['DAMAGE', 'EFFECT', 'HIT', 'CONDITION', 'STACK', 'BUFF', 'REMOVAL', 'TRIGGER', 'BASE', 'RAW', 'MULTI', 'ROOT', 'BLEED', 'COMBO', 'OVERTIME', 'PULSE', 'ZONE', 'CDR', 'AREA', 'TRACKER', 'DASH'];

    let fullHierarchy = [];
    let filteredList = [];
    let currentIndex = 0;
    const PAGE_SIZE = 15;

    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch(FILE_NAME);
            if (!response.ok) throw new Error("File not found");
            const xmlDoc = new DOMParser().parseFromString(await response.text(), "text/xml");
            parseHierarchy(xmlDoc);
            
            document.getElementById('spellSearch').addEventListener('input', (e) => {
                const term = e.target.value.toUpperCase();
                filteredList = fullHierarchy.filter(item => item.name.includes(term));
                resetAndRender();
            });

            filteredList = [...fullHierarchy];
            setupInfiniteScroll();
            resetAndRender();
        } catch (e) { document.getElementById('results').innerText = e.message; }
    });

    function parseHierarchy(xml) {
        const spells = xml.querySelectorAll('activespell, passivespell');
        const dataMap = {};
        const allSpellNames = new Set(Array.from(spells).map(s => s.getAttribute('uniquename')));

        spells.forEach(spell => {
            const fullName = spell.getAttribute('uniquename') || "UNKNOWN";
            let parts = fullName.split('_');
            let parent = fullName;
            
            for (let i = parts.length - 1; i > 0; i--) {
                let potential = parts.slice(0, i).join('_');
                if (allSpellNames.has(potential) || componentKeywords.includes(parts[i])) {
                    parent = potential;
                    // Recursive check for deeper roots
                    let subParts = parent.split('_');
                    for(let j = subParts.length - 1; j > 0; j--) {
                        if(allSpellNames.has(subParts.slice(0,j).join('_'))) parent = subParts.slice(0,j).join('_');
                    }
                    break;
                }
            }

            const compLabel = fullName === parent ? "MAIN ACTION" : fullName.replace(parent + '_', '');
            if (!dataMap[parent]) dataMap[parent] = { name: parent, summary: "", components: {} };
            if (!dataMap[parent].components[compLabel]) dataMap[parent].components[compLabel] = {};

            const extract = (el, type) => {
                const target = el.getAttribute('target') || 'default';
                const attr = el.getAttribute('attribute') || el.getAttribute('type');
                const val = el.getAttribute('change') || el.getAttribute('value');
                
                // If it's the main action, bubble the primary value to the header
                if (compLabel === "MAIN ACTION" && (attr === 'health' || attr === 'damage' || attr === 'hit')) {
                    dataMap[parent].summary = `${attr.toUpperCase()}: ${val}`;
                }

                if (!dataMap[parent].components[compLabel][target]) dataMap[parent].components[compLabel][target] = [];
                dataMap[parent].components[compLabel][target].push({
                    type, source: fullName, attr, val, time: el.getAttribute('time'),
                    charges: Array.from(el.querySelectorAll('IfCharge, IfConsumeCharges')).map(cs => ({
                        spell: cs.getAttribute('chargespell') || cs.getAttribute('spell'),
                        items: Array.from(cs.querySelectorAll('change')).map(o => ({
                            min: o.getAttribute('mincharges') || 'Consumed',
                            newVal: o.getAttribute('value')
                        }))
                    }))
                });
            };

            Array.from(spell.getElementsByTagName('directattributechange')).forEach(el => extract(el, 'Attribute'));
            Array.from(spell.getElementsByTagName('buffovertime')).forEach(el => extract(el, 'Overtime'));
        });
        fullHierarchy = Object.values(dataMap).sort((a,b) => a.name.localeCompare(b.name));
    }

    function renderSpellBlock(item) {
        const block = document.createElement('div');
        block.className = 'parent-block';
        let html = `
            <div class="parent-header">
                <span class="parent-title">${item.name}</span>
                <span class="parent-summary">${item.summary}</span>
            </div>`;

        Object.keys(item.components).forEach(compName => {
            html += `<div class="component-box"><div class="component-header">${compName.replace(/_/g, ' ')}</div>`;
            Object.keys(item.components[compName]).forEach(target => {
                html += `<span class="target-badge target-${target.toLowerCase()}">${target}</span><div class="effect-grid">`;
                item.components[compName][target].forEach(e => {
                    let cHtml = e.charges.map(c => `
                        <div class="charge-logic">
                            <div style="color:var(--accent); font-size:0.7em; margin-bottom:3px;">${c.spell}</div>
                            ${c.items.map(r => `<div class="charge-row"><span>${r.min}</span><b>${r.newVal}</b></div>`).join('')}
                        </div>`).join('');
                    html += `<div class="effect-item">
                        <b>${e.attr}</b>: <code>${e.val}</code>${e.time ? ` (${e.time}s)` : ''}
                        ${cHtml}
                        <div class="source-info">${e.source}</div>
                    </div>`;
                });
                html += `</div>`;
            });
            html += `</div>`;
        });
        block.innerHTML = html;
        return block;
    }

    function resetAndRender() { document.getElementById('results').innerHTML = ''; currentIndex = 0; loadMore(); }
    function loadMore() {
        const results = document.getElementById('results');
        const batch = filteredList.slice(currentIndex, currentIndex + PAGE_SIZE);
        batch.forEach(item => results.appendChild(renderSpellBlock(item)));
        currentIndex += PAGE_SIZE;
    }
    function setupInfiniteScroll() {
        new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentIndex < filteredList.length) loadMore();
        }, { threshold: 0.1 }).observe(document.getElementById('sentinel'));
    }
</script>
</body>
</html>
