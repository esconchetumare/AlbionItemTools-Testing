<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spell Multi-Component & Charge Viewer</title>
    <style>
        :root {
            --bg: #1a1b1e;
            --container-bg: #25262b;
            --panel-bg: #2c2e33;
            --text-main: #c1c2c5;
            --text-bright: #ffffff;
            --accent: #f08c00; 
            --border: #373a40;
            --tag-bg: #d9480f;
            --enemy: #c92a2a;
            --caster: #1864ab;
            --self: #5f3dc4;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
        }

        .container { 
            max-width: 1200px; 
            margin: auto; 
            background: var(--container-bg); 
            padding: 30px; 
            min-height: 100vh;
        }

        .search-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--container-bg);
            padding: 10px 0 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        #spellSearch {
            width: 100%;
            padding: 12px 20px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-bright);
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        #spellSearch:focus { border-color: var(--accent); }

        .parent-block { 
            border: 1px solid var(--border); 
            margin-bottom: 30px; 
            border-radius: 10px; 
            overflow: hidden; 
            background: var(--panel-bg); 
        }

        .parent-title { 
            background: #141517; 
            color: var(--accent); 
            padding: 15px 25px; 
            font-size: 1.4em; 
            font-weight: 800; 
            text-transform: uppercase; 
            border-bottom: 2px solid var(--accent); 
        }

        .component-box { 
            margin: 15px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            background: rgba(0,0,0,0.2); 
        }

        .component-header { 
            background: rgba(255,255,255,0.03); 
            padding: 10px 15px; 
            font-weight: bold; 
            border-bottom: 1px solid var(--border);
            color: var(--text-bright);
            font-size: 0.9em;
        }

        .target-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75em; font-weight: bold; text-transform: uppercase; margin: 10px 0; }
        .target-enemy { background: #5c0e0e; color: #ff8787; }
        .target-caster { background: #0b2e4f; color: #74c0fc; }
        .target-self { background: #26194d; color: #b197fc; }

        .effect-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; padding: 0 15px 15px 15px; }
        .effect-item { background: var(--panel-bg); border: 1px solid var(--border); padding: 12px; border-radius: 6px; }
        
        .charge-logic { margin-top: 10px; padding: 8px; background: #2d2412; border: 1px solid #4d3d1a; border-radius: 4px; font-size: 0.85em; }
        .charge-title { color: var(--accent); font-weight: bold; font-size: 0.75em; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .charge-row { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        code { color: #ffca28; font-weight: bold; background: rgba(255, 202, 40, 0.1); padding: 2px 5px; border-radius: 3px; }
        .source-info { font-size: 0.7em; color: #5c5f66; margin-top: 8px; font-family: monospace; }
        
        #sentinel { height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <h1 style="color: var(--text-bright); margin: 0 0 15px 0; font-size: 1.5rem;">Spell Inspector (Nested)</h1>
        <input type="text" id="spellSearch" placeholder="Search parent spells (e.g. RENDINGSPIN, HOLY)...">
    </div>
    
    <div id="results"></div>
    <div id="sentinel"></div>
</div>

<script>
    const FILE_NAME = 'spells.xml';
    const componentSuffixes = /_(MOVESPEEDBUFF|CLEANUP|EFFECT|DAMAGE|HIT|CONDITION|STACK|BUFF|REMOVAL|TRIGGER|PREMULTI_REMOVE|BASE|RAW)\d*$/g;
    const variationWords = /_(SECOND|THIRD|FOURTH|FIFTH|MAX|LOW|MAXDAMAGE|LOWDAMAGE)/g;

    let fullHierarchy = [];
    let filteredList = [];
    let currentIndex = 0;
    const PAGE_SIZE = 10;

    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch(FILE_NAME);
            if (!response.ok) throw new Error("Could not load spells.xml");
            const text = await response.text();
            const xmlDoc = new DOMParser().parseFromString(text, "text/xml");
            parseHierarchy(xmlDoc);
            
            document.getElementById('spellSearch').addEventListener('input', (e) => {
                const term = e.target.value.toUpperCase();
                filteredList = fullHierarchy.filter(item => item.name.includes(term));
                resetAndRender();
            });

            filteredList = [...fullHierarchy];
            setupInfiniteScroll();
            resetAndRender();

        } catch (error) {
            document.getElementById('results').innerHTML = `<div style="color:var(--enemy)">Error: ${error.message}</div>`;
        }
    });

    function parseHierarchy(xml) {
        const spells = xml.querySelectorAll('activespell, passivespell');
        const dataMap = {};

        spells.forEach(spell => {
            const fullName = spell.getAttribute('uniquename') || "UNKNOWN";
            // Logic to determine the "Parent" root for nesting
            const parent = fullName.replace(componentSuffixes, '').replace(variationWords, '');
            // Logic to determine the "Component" label within that parent
            const component = fullName.replace(parent, '').replace(/^_/, '') || "MAIN ACTION";
            
            if (!dataMap[parent]) dataMap[parent] = {};
            if (!dataMap[parent][component]) dataMap[parent][component] = {};

            const extract = (el, type) => {
                const target = el.getAttribute('target') || 'default';
                if (!dataMap[parent][component][target]) dataMap[parent][component][target] = [];
                
                let effect = {
                    type, source: fullName, 
                    attr: el.getAttribute('attribute') || el.getAttribute('type'),
                    val: el.getAttribute('change') || el.getAttribute('value'),
                    time: el.getAttribute('time'),
                    charges: []
                };

                const cs = el.querySelector('IfCharge, IfConsumeCharges');
                if (cs) {
                    effect.charges.push({
                        spell: cs.getAttribute('chargespell') || cs.getAttribute('spell'),
                        items: Array.from(cs.querySelectorAll('change')).map(o => ({
                            min: o.getAttribute('mincharges') || 'Consumed',
                            newVal: o.getAttribute('value')
                        }))
                    });
                }
                dataMap[parent][component][target].push(effect);
            };

            Array.from(spell.getElementsByTagName('directattributechange')).forEach(el => extract(el, 'Attribute Change'));
            Array.from(spell.getElementsByTagName('buffovertime')).forEach(el => extract(el, 'Buff Over Time'));
            Array.from(spell.getElementsByTagName('channelingspell')).forEach(chan => {
                Array.from(chan.getElementsByTagName('directattributechange')).forEach(el => extract(el, 'Channel Effect'));
            });
        });

        fullHierarchy = Object.keys(dataMap).sort().map(name => ({ name, data: dataMap[name] }));
    }

    function renderSpellBlock(item) {
        const block = document.createElement('div');
        block.className = 'parent-block';
        let html = `<div class="parent-title">${item.name}</div>`;

        // Components like DAMAGE or EFFECT are now rendered inside this parent block
        Object.keys(item.data).forEach(compName => {
            html += `<div class="component-box"><div class="component-header">${compName.replace(/_/g, ' ')}</div>`;
            Object.keys(item.data[compName]).forEach(target => {
                html += `<div style="padding: 0 15px;"><span class="target-badge target-${target.toLowerCase()}">${target}</span></div><div class="effect-grid">`;
                item.data[compName][target].forEach(e => {
                    let chargeHtml = e.charges.map(c => `
                        <div class="charge-logic">
                            <span class="charge-title">${c.spell}</span>
                            ${c.items.map(row => `<div class="charge-row"><span>${row.min}</span><b>${row.newVal}</b></div>`).join('')}
                        </div>`).join('');

                    html += `
                        <div class="effect-item">
                            <div style="font-size:0.65em; font-weight:bold; color:var(--accent); margin-bottom:4px;">${e.type}</div>
                            <b>${e.attr}</b>: <code>${e.val}</code>${e.time ? ` over ${e.time}s` : ''}
                            ${chargeHtml}
                            <div class="source-info">XML: ${e.source}</div>
                        </div>`;
                });
                html += `</div>`;
            });
            html += `</div>`;
        });
        block.innerHTML = html;
        return block;
    }

    function resetAndRender() {
        document.getElementById('results').innerHTML = '';
        currentIndex = 0;
        loadMore();
    }

    function loadMore() {
        const results = document.getElementById('results');
        const nextBatch = filteredList.slice(currentIndex, currentIndex + PAGE_SIZE);
        nextBatch.forEach(item => results.appendChild(renderSpellBlock(item)));
        currentIndex += PAGE_SIZE;
    }

    function setupInfiniteScroll() {
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && currentIndex < filteredList.length) {
                loadMore();
            }
        }, { threshold: 0.1 });
        observer.observe(document.getElementById('sentinel'));
    }
</script>
</body>
</html>
