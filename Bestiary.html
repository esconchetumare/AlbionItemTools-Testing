<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albion Mob Analyst</title>
    <style>
        :root {
            --primary: #1a1a1a; --accent: #e67e22; --bg: #0f0f0f;
            --card: #1e1e1e; --text: #d1d1d1; --highlight: #f1c40f;
            --border: #333;
            --clr-morgana: #8e44ad; --clr-keeper: #27ae60;
            --clr-undead: #7f8c8d; --clr-royal: #2980b9; --clr-king: #d35400;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.4; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        .header-section {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            margin-bottom: 20px; padding: 20px;
            background: var(--card); border-radius: 12px; border: 1px dashed var(--accent);
            position: relative;
        }

        .status-bar { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .status-online { color: #27ae60; }

        .btn-pref {
            position: absolute; top: 20px; right: 20px;
            background: #333; color: #fff; border: 1px solid var(--accent);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8rem;
        }
        .btn-pref:hover { background: var(--accent); }

        .zone-bonus-display {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .bonus-card {
            background: #111; border: 1px solid #222; padding: 12px; border-radius: 8px;
            text-align: center; border-bottom: 3px solid var(--accent);
        }
        .bonus-val { display: block; font-size: 1.2rem; font-weight: bold; color: #fff; }
        .bonus-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .controls {
            background: var(--card); padding: 25px; border-radius: 12px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .filter-group { display: flex; flex-direction: column; width: 100%; }
        .filter-group label { display: block; margin-bottom: 8px; font-size: 0.75rem; text-transform: uppercase; color: #888; font-weight: bold; }
        
        .search-container { position: relative; grid-column: 1 / -1; }
        .search-container input { padding-left: 45px; border-color: var(--accent); font-size: 1.1rem; width: 100%; box-sizing: border-box;}
        .search-icon { position: absolute; left: 15px; top: 38px; color: var(--accent); font-size: 1.2rem; pointer-events: none; z-index: 5;}

        select, .input-base { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; outline: none; }

        .multi-toggle-group { display: flex; flex-wrap: wrap; gap: 4px; background: #222; padding: 4px; border-radius: 16px; border: 1px solid #444; flex-grow: 1; }
        .tgl-item { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; color: #ccc; cursor: pointer; padding: 0px 6px; border-radius: 16px; }
        .tgl-item input { cursor: pointer; accent-color: var(--accent); }

        .premium-group { display: flex; align-items: center; gap: 4px; background: #222; padding: 16px; border-radius: 16px; border: 1px solid #444; height: 100%; box-sizing: border-box; }
        .premium-group label { color: var(--highlight); margin-bottom: 0; font-size: 0.85rem; cursor: pointer; white-space: nowrap;}

        .table-container { border-radius: 8px; overflow-x: auto; background: var(--card); min-height: 400px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #000; color: var(--accent); padding: 15px; text-align: left; font-size: 0.75rem; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 10; }
        th.sort-active { color: var(--highlight); border-bottom: 2px solid var(--highlight); }
        td { padding: 12px 15px; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; }
        
        tr.main-row:hover { background: #252525; cursor: pointer; }
        tr.f-morgana { border-left: 4px solid var(--clr-morgana); }
        tr.f-keeper { border-left: 4px solid var(--clr-keeper); }
        tr.f-undead { border-left: 4px solid var(--clr-undead); }
        tr.f-royal { border-left: 4px solid var(--clr-royal); }
        tr.f-king { border-left: 4px solid var(--clr-king); }
        
        .val-fame { color: var(--highlight); }
        .detail-row { display: none; background: #0a0a0a; }
        .detail-row.active { display: table-row; }
        
        .details-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        .stats-section h4, .loot-section h4 { color: var(--accent); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 8px; text-transform: uppercase; font-size: 0.8rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .stat-box { display: flex; justify-content: space-between; background: #161616; padding: 8px; border-radius: 4px; border-left: 2px solid var(--accent); font-size: 0.75rem; }

        .loot-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; background: #111; border-radius: 5px; overflow: hidden; }
        .loot-table th { background: #222; color: #888; padding: 8px; text-align: left; position: relative; }
        .loot-table td { padding: 6px 8px; border-bottom: 1px solid #222; }

        #sentinel { height: 40px; width: 100%; }

        #prefModal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: #1a1a1a; margin: 2% auto; padding: 30px; width: 90%; max-width: 1200px; 
            border-radius: 15px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .tabs { display: flex; gap: 15px; }
        .tab-btn { background: #252525; border: 1px solid #444; color: #aaa; padding: 12px 25px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 12px; background: #222; padding: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #333; }
        .check-item:has(input:checked) { border-color: var(--accent); background: #261a10; }
        .action-bar { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; background: #111; padding: 15px; border-radius: 10px; }
        .btn-action { background: #444; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>MOB ANALYST</h1>
        <div class="status-bar" id="loadStatus">Initializing environment...</div>
        <button class="btn-pref" id="openPrefs">⚙ Preferences</button>
    </div>

    <div class="zone-bonus-display">
        <div class="bonus-card"><span class="bonus-label">Fame Factor</span><span class="bonus-val" id="z-fame">1.0</span></div>
        <div class="bonus-card"><span class="bonus-label">Mob Loot</span><span class="bonus-val" id="z-loot">1.0</span></div>
        <div class="bonus-card"><span class="bonus-label">Mob Silver</span><span class="bonus-val" id="z-silver">1.0</span></div>
        <div class="bonus-card"><span class="bonus-label">Gathering</span><span class="bonus-val" id="z-gather">1.0</span></div>
        <div class="bonus-card"><span class="bonus-label">Fishing</span><span class="bonus-val" id="z-fish">1.0</span></div>
        <div class="bonus-card"><span class="bonus-label">Stat Bonus</span><span class="bonus-val" id="z-stats">1.0</span></div>
    </div>

    <div class="controls">
        <div class="filter-group search-container">
            <label>Live Search</label>
            <span class="search-icon">🔍</span>
            <input type="text" id="mainSearch" placeholder="Filter by name, unique ID, or faction..." class="input-base">
        </div>
        
        <div class="filter-group">
            <label>Current Zone</label>
            <select id="zoneFilter">
                <option value="safe">Safe (Blue)</option>
                <option value="yellow" selected>Yellow</option>
                <option value="orange">Orange</option>
                <option value="red">Red</option>
                <option value="black">Black (Base)</option>
                <option value="black_t1">Black Tier 1</option>
                <option value="black_t2">Black Tier 2</option>
                <option value="black_t3">Black Tier 3</option>
                <option value="black_t4">Black Tier 4</option>
                <option value="black_t5">Black Tier 5</option>
                <option value="black_t6">Black Tier 6</option>
                <option value="hell_nl">Hellgate (Non-Lethal)</option>
                <option value="hell_l">Hellgate (Lethal)</option>
                <option value="cor_beg">Corrupted (Beginner)</option>
                <option value="cor_int">Corrupted (Int/Pro)</option>
                <option value="mist_y">Mists (Yellow)</option>
                <option value="mist_b">Mists (Black)</option>
                <option value="exp">Expedition</option>
                <option value="tunnel">Tunnel</option>
            </select>
        </div>

        <div class="filter-group"><label>Tier</label><select id="tierFilter"><option value="all">All Tiers</option></select></div>

        <div class="filter-group">
            <label>Faction</label>
            <select id="factionFilter">
                <option value="all">All Factions</option>
                <option value="AVALON">Avalon</option>
                <option value="KEEPER">Keeper</option>
                <option value="UNDEAD">Undead</option>
                <option value="MORGANA">Morgana</option>
                <option value="HERETIC">Heretic</option>
                <option value="ROYAL">Royal</option>
                <option value="KING">King</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Mob Rank Filter</label>
            <div class="multi-toggle-group">
                <label class="tgl-item"><input type="checkbox" id="rankBoss" checked> Boss</label>
                <label class="tgl-item"><input type="checkbox" id="rankMini" checked> Mini</label>
                <label class="tgl-item"><input type="checkbox" id="rankChamp" checked> Champ</label>
                <label class="tgl-item"><input type="checkbox" id="rankElite" checked> Elite</label>
                <label class="tgl-item"><input type="checkbox" id="rankVeteran" checked> Vet</label>
                <label class="tgl-item"><input type="checkbox" id="rankStd" checked> Std</label>
            </div>
        </div>

        <div class="filter-group">
            <label>Premium Status</label>
            <div class="premium-group">
                <input type="checkbox" id="premiumToggle">
                <label for="premiumToggle">+50% Fame/Silver</label>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="sentinel"></div>
    </div>
</div>

<div id="prefModal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('cols')">Columns</button>
                <button class="tab-btn" onclick="showTab('cats')">Categories</button>
                <button class="tab-btn" onclick="showTab('stats')">Tech Stats</button>
            </div>
            <button class="btn-action" style="background:var(--accent); font-weight:bold; padding: 12px 30px;" onclick="closeModal()">APPLY CHANGES</button>
        </div>

        <div id="colsTab" class="tab-content">
            <div class="action-bar">
                <button class="btn-action" onclick="bulkAction('cols', true)">Select All</button>
                <button class="btn-action" onclick="bulkAction('cols', false)">Clear All</button>
                <label class="check-item" style="margin-left: auto; padding: 8px 15px;">
                    <input type="checkbox" id="prefSilverDebug" onchange="toggleSilverPref()">
                    <span>Show Silver Formula Debug</span>
                </label>
            </div>
            <div class="checkbox-grid" id="colChecks"></div>
        </div>

        <div id="catsTab" class="tab-content" style="display:none;">
            <div class="action-bar">
                <button class="btn-action" onclick="bulkAction('cats', true)">Select All</button>
                <button class="btn-action" onclick="bulkAction('cats', false)">Clear All</button>
            </div>
            <div class="checkbox-grid" id="catChecks"></div>
        </div>

        <div id="statsTab" class="tab-content" style="display:none;">
            <div class="action-bar">
                <button class="btn-action" onclick="bulkAction('stats', true)">Select All</button>
                <button class="btn-action" onclick="bulkAction('stats', false)">Clear All</button>
                <input type="text" id="statSearch" placeholder="Search tech attributes..." class="input-base" style="width:300px; margin-left:auto;" oninput="filterStatList()">
            </div>
            <div class="checkbox-grid" id="statChecks"></div>
        </div>
    </div>
</div>

<script>
    const ZONE_DATA = {
        safe: {f:2.15, l:1.25, s:1.45, g:1, fi:1, b:1},
        yellow: {f:2.4, l:1.33, s:1.53, g:1, fi:1, b:1},
        orange: {f:2.9, l:1.8, s:2, g:1, fi:1, b:1},
        red: {f:3.3, l:2.25, s:2.6, g:1, fi:1, b:1},
        black: {f:4.2, l:2.6, s:3, g:1, fi:1, b:1},
        black_t1: {f:4.2, l:2.6, s:3, g:1.25, fi:1.25, b:1},
        black_t2: {f:4.6, l:2.8, s:3.3, g:1.3, fi:1.3, b:1.05},
        black_t3: {f:5, l:3, s:3.6, g:1.35, fi:1.35, b:1.1},
        black_t4: {f:5.4, l:3.2, s:3.9, g:1.4, fi:1.4, b:1.15},
        black_t5: {f:5.8, l:3.4, s:4.2, g:1.45, fi:1.45, b:1.2},
        black_t6: {f:6.3, l:3.6, s:4.5, g:1.5, fi:1.5, b:1.25},
        hell_nl: {f:2.4, l:1.33, s:1.53, g:1, fi:1, b:1},
        hell_l: {f:4.2, l:2.6, s:3, g:1, fi:1, b:1},
        cor_beg: {f:2.4, l:1.33, s:1.53, g:1, fi:1, b:1},
        cor_int: {f:4.2, l:2.6, s:3, g:1, fi:1, b:1},
        mist_y: {f:1.8, l:1.33, s:1.53, g:1, fi:1, b:1},
        mist_b: {f:3.16, l:2.6, s:3, g:1, fi:1, b:1},
        exp: {f:1, l:0.5, s:0.5, g:1, fi:1, b:1},
        tunnel: {f:4.2, l:3, s:3.45, g:1, fi:1, b:1}
    };

    let globalMobData = [];
    let currentFilteredData = [];
    let harvestLookup = {};
    let allPossibleStats = new Set();
    let allPossibleCats = new Set();
    let currentSort = { col: 'Efficiency', dir: -1 }; 
    let displayLimit = 50;
    let maxEffGlobal = 0, maxSilEffGlobal = 0;

    let prefs = JSON.parse(localStorage.getItem('mobPrefsV25')) || {
        cols: ['Tier', 'Identity', 'True_HP', 'eHP', 'Fame', 'Silver', 'Efficiency', 'Silver Eff.'],
        orderedStats: [], enabledCats: [], showSilverDebug: true
    };

    const COL_MAP = {
        'Tier': { label: 'T', sort: m => parseInt(m.tier), render: m => `<td>T${m.tier}</td>` },
        'Identity': { label: 'Name', sort: m => m._displayLabel, render: m => `<td><b>${m._displayLabel}</b><div style="font-size:0.6rem; color:#666">${m.uniquename}</div></td>` },
        'True_HP': { label: 'HP (Adj)', sort: m => m._trueHP, render: m => `<td>${Math.floor(m._trueHP).toLocaleString()}</td>` },
        'eHP': { label: 'eHP', sort: m => m._trueEHP, render: m => `<td>${Math.floor(m._trueEHP).toLocaleString()}</td>` },
        'Fame': { label: 'Fame', sort: m => m._adjFame, render: m => `<td class="val-fame">${Math.floor(m._adjFame).toLocaleString()}</td>` },
        'Silver': { label: 'Silver', sort: m => m._adjSilver, render: m => `<td>${Math.floor(m._adjSilver).toLocaleString()}${prefs.showSilverDebug ? m._silverDebug : ''}</td>` },
        'Efficiency': { label: 'Fame Eff.', sort: m => m._eff, render: (m, max) => `<td style="color:${getColorScale(m._eff, max)}; font-weight:bold;">${m._eff.toFixed(3)}</td>` },
        'Silver Eff.': { label: 'Silver Eff.', sort: m => m._silEff, render: (m, max) => `<td style="color:${getColorScale(m._silEff, max)}; font-weight:bold;">${m._silEff.toFixed(4)}</td>` },
        'Faction': { label: 'Faction', sort: m => m.faction, render: m => `<td>${m.faction||'-'}</td>` }
    };

    function getColorScale(val, max) {
        if (!max || val <= 0) return 'inherit';
        const ratio = val / max;
        const r = Math.floor(100 + (ratio * 155));
        const g = Math.floor(150 + (ratio * 105));
        const b = Math.floor(200 - (ratio * 150));
        return `rgb(${r},${g},${b})`;
    }

    function getChanceData(chance) {
        if (!chance || isNaN(chance)) return { ratio: chance, percent: chance };
        const num = parseFloat(chance);
        if (num <= 0) return { ratio: '0', percent: '0%' };
        const xVal = 1 / num;
        let ratioStr = (num >= 1) ? `x${num.toFixed(4).replace(/\.?0+$/, '')}` : `1/${xVal.toFixed(4).replace(/\.?0+$/, '')}`;
        const percentStr = (num * 100).toFixed(4).replace(/\.?0+$/, '') + '%';
        return { ratio: ratioStr, percent: percentStr };
    }

    async function initData() {
        const status = document.getElementById('loadStatus');
        try {
            status.innerHTML = "Fetching mobs.xml...";
            const mobsRes = await fetch('mobs.xml');
            const mobsText = await mobsRes.text();
            status.innerHTML = "Fetching harvestables.xml...";
            const harvRes = await fetch('harvestables.xml');
            const harvText = await harvRes.text();
            processHarvestables(harvText);
            processMobs(mobsText);
            status.innerHTML = "Data Status: <span class='status-online'>Online</span>";
            status.classList.add('status-online');
        } catch (err) {
            status.innerHTML = "Error loading files. Ensure mobs.xml and harvestables.xml are local.";
            console.error(err);
        }
    }

    function processHarvestables(text) {
        const xmlDoc = new DOMParser().parseFromString(text, "text/xml");
        const harvests = xmlDoc.getElementsByTagName("Harvestable");
        harvestLookup = {};
        for (let h of harvests) {
            const hName = h.getAttribute('name'); harvestLookup[hName] = {};
            for (let t of h.getElementsByTagName("Tier")) {
                const tVal = t.getAttribute('tier');
                for (let c of t.getElementsByTagName("Charge")) {
                    if (c.getAttribute('level') === "1") harvestLookup[hName][tVal] = parseFloat(c.getAttribute('yield')) || 0;
                }
            }
        }
    }

    function processMobs(text) {
        const xmlDoc = new DOMParser().parseFromString(text, "text/xml");
        const mobs = xmlDoc.getElementsByTagName("Mob");
        globalMobData = []; allPossibleStats.clear(); allPossibleCats.clear();
        for (let mob of mobs) {
            let m = {};
            for (let a of mob.attributes) { m[a.name] = a.value; allPossibleStats.add(a.name); }
            m.category = m.category || "GENERAL";
            allPossibleCats.add(m.category);
            m._baseHP = parseFloat(m.hitpointsmax) || 0;
            m._baseFame = parseFloat(m.fame) || 0;
            m._baseSilver = parseFloat(m.silvermodifier) || 0;
            m._avgRes = ((parseFloat(m.physicalarmor)||0) + (parseFloat(m.magicresistance)||0)) / 2;
            m._displayLabel = m.namelocatag ? m.namelocatag.replace('@MOB_', '').replace(/_/g, ' ') : m.uniquename;
            m._searchStr = `${m._displayLabel} ${m.uniquename} ${m.faction || ''}`.toLowerCase();
            
            const u = m.uniquename.toUpperCase();
            if (u.includes("MINI")) m._rank = "mini";
            else if (u.includes("BOSS")) m._rank = "boss";
            else if (u.includes("CHAMP")) m._rank = "champ";
            else if (u.includes("ELITE")) m._rank = "elite";
            else if (u.includes("VETERAN")) m._rank = "veteran";
            else m._rank = "std";

            const f = (m.faction || "").toUpperCase();
            m._fClass = f.includes("MORGANA") ? "f-morgana" : f.includes("KEEPER") ? "f-keeper" : f.includes("UNDEAD") ? "f-undead" : f.includes("ROYAL") ? "f-royal" : f.includes("KING") ? "f-king" : "";
            m._loot = []; m._hType = null; m._hTier = m.tier;
            const lootNode = mob.getElementsByTagName("Loot")[0];
            if (lootNode) {
                const harvestTag = lootNode.getElementsByTagName("Harvestable")[0];
                if (harvestTag) { m._hType = harvestTag.getAttribute('type'); m._hTier = harvestTag.getAttribute('tier') || m.tier; }
                const references = lootNode.getElementsByTagName("LootListReference");
                for (let ref of references) { m._loot.push({ name: ref.getAttribute('name'), ...getChanceData(ref.getAttribute('chance')) }); }
                const items = lootNode.querySelectorAll('LootList, LootItem');
                items.forEach(item => { m._loot.push({ name: item.getAttribute('name') || item.getAttribute('uniquename') || "Unknown", ...getChanceData(item.getAttribute('chance')) }); });
            }
            globalMobData.push(m);
        }
        if(prefs.enabledCats.length === 0) prefs.enabledCats = [...allPossibleCats];
        if(prefs.orderedStats.length === 0) prefs.orderedStats = Array.from(allPossibleStats).sort();
        setupTierFilter(); initPrefs(); render();
    }

    function renderTableRows(isAppend = false) {
        const container = document.getElementById('tableBody');
        const slice = currentFilteredData.slice(isAppend ? displayLimit - 50 : 0, displayLimit);
        const rowsHtml = slice.map((m, i) => {
            const index = (isAppend ? displayLimit - 50 : 0) + i;
            const lootRows = m._loot.length > 0 ? m._loot.map(l => `<tr><td>${l.name}</td><td>${l.ratio}</td><td>${l.percent}</td></tr>`).join('') : `<tr><td colspan="3" style="color:#666; font-style:italic; text-align:center;">No direct loot found</td></tr>`;
            return `<tr class="main-row ${m._fClass}" onclick="toggleDetail(${index})">${prefs.cols.map(c => COL_MAP[c].render(m, c.includes('Silver') ? maxSilEffGlobal : maxEffGlobal)).join('')}</tr>
            <tr class="detail-row" id="detail-${index}"><td colspan="${prefs.cols.length}">
                <div class="details-wrapper">
                    <div class="stats-section"><h4>Technical Stats</h4><div class="stats-grid">${prefs.orderedStats.filter(sk => m[sk] !== undefined).map(sk => `<div class="stat-box"><span>${sk}</span><b>${m[sk]}</b></div>`).join('')}</div></div>
                    <div class="loot-section"><h4>Loot Tables</h4><table class="loot-table"><thead><tr><th>Item/List Name</th><th>Ratio (1/x)</th><th>Prob (%)</th></tr></thead><tbody>${lootRows}</tbody></table></div>
                </div>
            </td></tr>`;
        }).join('');
        if (isAppend) container.insertAdjacentHTML('beforeend', rowsHtml); else container.innerHTML = rowsHtml;
    }

    function render() {
        const z = ZONE_DATA[document.getElementById('zoneFilter').value];
        const prem = document.getElementById('premiumToggle').checked ? 1.5 : 1.0;
        const q = document.getElementById('mainSearch').value.toLowerCase();
        displayLimit = 50;
        document.getElementById('z-fame').innerText = `x${z.f}`; document.getElementById('z-loot').innerText = `x${z.l}`;
        document.getElementById('z-silver').innerText = `x${z.s}`; document.getElementById('z-gather').innerText = `x${z.g}`;
        document.getElementById('z-fish').innerText = `x${z.fi}`; document.getElementById('z-stats').innerText = `x${z.b}`;
        maxEffGlobal = 0; maxSilEffGlobal = 0;
        globalMobData.forEach(m => {
            let yieldStat = (m._hType && harvestLookup[m._hType]) ? (harvestLookup[m._hType][m._hTier] || 1.0) : 1.0;
            const step1 = Math.trunc(m._baseSilver * yieldStat);
            const step2 = Math.floor(step1 * z.s);
            const step3 = Math.trunc(step2 * 0.9);
            m._adjSilver = Math.trunc((step3 / 1.156) * prem);
            m._silverDebug = `<div style="font-size:0.6rem;color:#666">Logic: T${m._hTier} ${m._hType||'Default'} | Formula: INT(INT(FLOOR(INT(${m._baseSilver}*${yieldStat})*${z.s})*0.9)/1.156*${prem})</div>`;
            m._trueHP = m._baseHP * z.b; m._trueEHP = m._trueHP * (1 + m._avgRes / 100);
            m._adjFame = m._baseFame * z.f * prem;
            m._eff = m._adjFame / (m._trueEHP || 1); m._silEff = m._adjSilver / (m._trueEHP || 1);
            if(m._eff > maxEffGlobal) maxEffGlobal = m._eff; if(m._silEff > maxSilEffGlobal) maxSilEffGlobal = m._silEff;
        });
        const ranks = { 
            boss: document.getElementById('rankBoss').checked, 
            mini: document.getElementById('rankMini').checked, 
            champ: document.getElementById('rankChamp').checked, 
            elite: document.getElementById('rankElite').checked,
            veteran: document.getElementById('rankVeteran').checked,
            std: document.getElementById('rankStd').checked 
        };
        const tier = document.getElementById('tierFilter').value;
        const faction = document.getElementById('factionFilter').value;
        currentFilteredData = globalMobData.filter(m => {
            if (tier !== 'all' && m.tier !== tier) return false;
            if (faction !== 'all' && !(m.faction || "").includes(faction)) return false;
            if (!ranks[m._rank]) return false;
            if (q && !m._searchStr.includes(q)) return false;
            if (!prefs.enabledCats.includes(m.category)) return false;
            return true;
        });
        const sortObj = COL_MAP[currentSort.col];
        currentFilteredData.sort((a, b) => (sortObj.sort(a) < sortObj.sort(b) ? -currentSort.dir : currentSort.dir));
        document.getElementById('tableHead').innerHTML = prefs.cols.map(c => `<th onclick="setSort('${c}')" class="${currentSort.col === c ? 'sort-active' : ''}">${COL_MAP[c].label}</th>`).join('');
        renderTableRows(false);
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && displayLimit < currentFilteredData.length) { displayLimit += 50; renderTableRows(true); }
    }, { threshold: 0.1 });
    observer.observe(document.getElementById('sentinel'));

    function initPrefs() {
        document.getElementById('prefSilverDebug').checked = prefs.showSilverDebug;
        document.getElementById('colChecks').innerHTML = Object.keys(COL_MAP).map(c => `<label class="check-item"><input type="checkbox" ${prefs.cols.includes(c)?'checked':''} onchange="toggleCol('${c}')"><span>${c}</span></label>`).join('');
        document.getElementById('catChecks').innerHTML = [...allPossibleCats].sort().map(cat => `<label class="check-item"><input type="checkbox" ${prefs.enabledCats.includes(cat)?'checked':''} onchange="toggleCat('${cat}')"><span>${cat}</span></label>`).join('');
        document.getElementById('statChecks').innerHTML = [...allPossibleStats].sort().map(s => `<label class="check-item"><input type="checkbox" ${prefs.orderedStats.includes(s)?'checked':''} onchange="toggleStat('${s}')"><span>${s}</span></label>`).join('');
    }

    function toggleSilverPref() { prefs.showSilverDebug = document.getElementById('prefSilverDebug').checked; save(); }
    function toggleCol(c) { prefs.cols = prefs.cols.includes(c) ? prefs.cols.filter(x => x!==c) : [...prefs.cols, c]; save(); }
    function toggleCat(cat) { prefs.enabledCats = prefs.enabledCats.includes(cat) ? prefs.enabledCats.filter(x => x!==cat) : [...prefs.enabledCats, cat]; save(); }
    function toggleStat(s) { prefs.orderedStats = prefs.orderedStats.includes(s) ? prefs.orderedStats.filter(x => x !== s) : [...prefs.orderedStats, s]; save(); }
    function save() { localStorage.setItem('mobPrefsV25', JSON.stringify(prefs)); render(); }
    function setSort(c) { if(currentSort.col === c) currentSort.dir *= -1; else { currentSort.col = c; currentSort.dir = -1; } render(); }
    function setupTierFilter() { const tiers = [...new Set(globalMobData.map(m => m.tier))].sort(); document.getElementById('tierFilter').innerHTML = '<option value="all">All Tiers</option>' + tiers.map(t => `<option value="${t}">T${t}</option>`).join(''); }
    function showTab(t) { document.querySelectorAll('.tab-content').forEach(tc => tc.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active')); document.getElementById(t + 'Tab').style.display = 'block'; event.currentTarget.classList.add('active'); }
    function toggleDetail(i) { document.getElementById('detail-'+i).classList.toggle('active'); }
    function closeModal() { document.getElementById('prefModal').style.display = 'none'; render(); }
    function bulkAction(type, select) {
        if(type==='cols') prefs.cols = select ? Object.keys(COL_MAP) : [];
        if(type==='cats') prefs.enabledCats = select ? [...allPossibleCats] : [];
        if(type==='stats') prefs.orderedStats = select ? [...allPossibleStats] : [];
        initPrefs(); save();
    }
    function filterStatList() {
        const q = document.getElementById('statSearch').value.toLowerCase();
        document.querySelectorAll('#statChecks .check-item').forEach(el => el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    }
    const debouncedRender = debounce(() => render());
    function debounce(func, timeout = 250) { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => { func.apply(this, args); }, timeout); }; }
    document.getElementById('mainSearch').addEventListener('input', debouncedRender);
    document.querySelectorAll('select, input[type=checkbox]').forEach(el => el.addEventListener('change', render));
    document.getElementById('openPrefs').onclick = () => { document.getElementById('prefModal').style.display = 'block'; };

    window.onload = initData;
</script>
</body>
</html>
