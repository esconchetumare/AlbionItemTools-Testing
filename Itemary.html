<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itemary - Albion Assets Inspector</title>
    <style>
        :root { --bg: #1a1a1a; --surface: #2d2d2d; --accent: #e67e22; --text: #eee; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 350px; border-right: 2px solid var(--accent); display: flex; flex-direction: column; background: var(--surface); }
        .ui-header { padding: 15px; border-bottom: 1px solid #444; }
        #search { width: 90%; padding: 8px; border-radius: 4px; border: none; }
        .item-list { flex: 1; overflow-y: auto; padding: 10px; }
        .item-row { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; transition: 0.2s; }
        .item-row:hover { background: #3d3d3d; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .stat-card { background: #333; padding: 10px; border-radius: 6px; border-left: 3px solid var(--accent); }
        .spell-box { background: #252525; padding: 15px; margin-top: 10px; border-radius: 8px; border: 1px solid #444; }
        .ref-val { color: #f1c40f; font-weight: bold; }
        summary { cursor: pointer; font-weight: bold; padding: 5px; color: var(--accent); }
        .progression-text { font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="ui-header">
        <input type="text" id="search" placeholder="Search items (e.g. T4_MAIN_BOW)...">
        <div style="margin-top:10px;">
            <select id="tierFilter"><option value="all">All Tiers</option></select>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    <div id="itemCount" style="padding: 5px 15px; font-size: 0.8em; color: #888;"></div>
    <div class="item-list" id="itemList"></div>
</div>

<div class="content" id="content">
    <h1>Select an item to view stats</h1>
</div>

<script>
    let items = [];
    let spellsMap = {};
    let namesMap = {};
    const PROGRESSION_FACTOR = 1.11803; // Standard Albion progression factor

    async function init() {
        try {
            const [itemsRes, spellsRes, namesRes] = await Promise.all([
                fetch('items.xml').then(r => r.text()),
                fetch('spells.xml').then(r => r.text()),
                fetch('items.txt').then(r => r.text())
            ]);
            
            processNames(namesRes);
            processSpells(spellsRes);
            processItems(itemsRes);
            
            setupFilters();
            renderList();
        } catch (e) {
            document.getElementById('content').innerHTML = "<h1>Error loading data files</h1>";
        }
    }

    function processNames(text) {
        text.split('\n').forEach(line => {
            const parts = line.split(':');
            if (parts.length > 1) namesMap[parts[0].trim()] = parts[1].trim();
        });
    }

    function processSpells(text) {
        const xml = new DOMParser().parseFromString(text, "text/xml");
        xml.querySelectorAll('activespell, passivespell').forEach(node => {
            spellsMap[node.getAttribute('uniquename')] = node;
        });
    }

    function processItems(text) {
        const xml = new DOMParser().parseFromString(text, "text/xml");
        xml.querySelectorAll('weapon, equipmentitem').forEach(node => {
            items.push({
                id: node.getAttribute('uniquename'),
                tier: parseInt(node.getAttribute('tier')),
                node: node
            });
        });
    }

    // RESOLVE LOCAREFERENCES LOGIC
    function resolveTag(spellNode, tag) {
        if (!tag) return null;
        tag = tag.replace(/\$/g, ''); // Clean $ symbols
        let targetNode = spellNode;
        let path = tag;

        if (tag.includes('.')) {
            const parts = tag.split('.');
            // External reference check (e.g., SPELLNAME.path)
            if (spellsMap[parts[0]]) {
                targetNode = spellsMap[parts[0]];
                path = parts.slice(1).join('.');
            }
        }

        const segments = path.split('.');
        let current = targetNode;

        for (let i = 0; i < segments.length; i++) {
            let segment = segments[i];
            let index = 0;
            const match = segment.match(/(.+)\[(\d+)\]/);
            if (match) {
                segment = match[1];
                index = parseInt(match[2]);
            }

            if (i === segments.length - 1) {
                return current.querySelectorAll(segment)[index]?.getAttribute(segment) || current.getAttribute(segment);
            } else {
                current = current.querySelectorAll(segment)[index];
                if (!current) return null;
            }
        }
        return null;
    }

    function renderItem(itemId) {
        const item = items.find(i => i.id === itemId);
        const node = item.node;
        const tier = item.tier;
        const ip = (tier * 100) + 300; // Formula: Tier * 100 + 300
        
        const name = namesMap[item.id] || item.id;
        const container = document.getElementById('content');
        
        // Calculate health scaling
        let health = node.getAttribute('maxhealth') || 0;
        const category = node.tagName.toLowerCase();
        // Shoes/Head get half health of armors
        if (item.id.includes('_SHOES') || item.id.includes('_HEAD')) {
            health = health * 0.5;
        }

        let html = `<h1>${name} (Tier ${tier})</h1>`;
        html += `<div class="stat-grid">
            <div class="stat-card"><strong>IP:</strong> ${ip}</div>
            <div class="stat-card"><strong>Health:</strong> ${health}</div>
        </div>`;

        // RETRACTABLE SPELLS SECTION
        const spellIds = node.getAttribute('activespells')?.split(' ') || [];
        if (spellIds.length > 0) {
            html += `<details style="margin-top:20px;">
                <summary>Active Spells (${spellIds.length})</summary>`;
            
            spellIds.forEach(sid => {
                const sNode = spellsMap[sid];
                if (!sNode) return;
                
                html += `<div class="spell-box">
                    <strong>${sid}</strong><br/>`;
                
                // Get Numbers from LocaReferences
                const refs = sNode.querySelectorAll('locareference');
                refs.forEach(ref => {
                    const tag = ref.getAttribute('tag');
                    const baseVal = parseFloat(resolveTag(sNode, tag));
                    if (!isNaN(baseVal)) {
                        // Apply progression formula: Base * Progression^(IP/100)
                        const scaled = (baseVal * Math.pow(PROGRESSION_FACTOR, ip / 100)).toFixed(2);
                        html += `<div>${tag}: <span class="ref-val">${scaled}</span> <span class="progression-text">(base: ${baseVal})</span></div>`;
                    }
                });
                
                html += `</div>`;
            });
            html += `</details>`;
        }

        container.innerHTML = html;
    }

    // Basic UI wiring
    function renderList() {
        const query = document.getElementById('search').value.toUpperCase();
        const filtered = items.filter(i => i.id.includes(query));
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        filtered.slice(0, 100).forEach(i => {
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerText = namesMap[i.id] || i.id;
            div.onclick = () => renderItem(i.id);
            list.appendChild(div);
        });
        document.getElementById('itemCount').innerText = `Showing ${Math.min(filtered.length, 100)} of ${filtered.length}`;
    }

    function setupFilters() {
        const tierSel = document.getElementById('tierFilter');
        for(let i=1; i<=8; i++) {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = `Tier ${i}`;
            tierSel.appendChild(opt);
        }
        document.getElementById('search').addEventListener('input', renderList);
    }

    window.onload = init;
</script>

</body>
</html>
