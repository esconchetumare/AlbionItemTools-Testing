<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itemary - Albion Assets Inspector</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --accent: #58a6ff; 
            --text: #c9d1d9; 
            --border: #30363d; 
            --tier: #f1c40f; 
            --header-bg: #1c2128; 
            --resource: #ffa657; 
            --upgrade: #f85149;
            --collapse-bg: #21262d; 
            --combat: #ff7b72;
            --cosy-block: #141920;
            --blue-grey: #8b949e;
            --silver: #bdc3c7;
            --success: #3fb950;
        }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            body { flex-direction: column; height: 100dvh; }
            .sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 2px solid var(--accent); flex: none; }
            .content { width: 100%; height: 60%; flex: none; padding: 15px; box-sizing: border-box; overflow-y: auto;}
            .ui-header { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
            .ui-header input[type="text"] { grid-column: span 2; }
            #resetBtn { grid-column: span 2; padding: 8px; margin-top: 4px; }
            .ui-header select, .ui-header input { margin: 0; width: 100%; box-sizing: border-box; padding: 8px; height: 38px;}
            .content-header > div { flex-direction: column; align-items: center; text-align: center; }
            .title-row { justify-content: center; flex-wrap: wrap; }
            .ip-controls { justify-content: center; flex-wrap: wrap; gap: 8px; }
            .tab-container { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 10px; white-space: nowrap; }
            .calc-controls { flex-direction: column; gap: 12px; }
            .calc-input-group { width: 100%; }
            .calc-input, .calc-select { width: 100%; box-sizing: border-box; }
            .calc-table { display: block; overflow-x: auto; white-space: nowrap; }
            .attr-grid { grid-template-columns: 1fr; }
            .cosy-block { min-width: 100%; box-sizing: border-box; }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* SIDEBAR NAVIGATION */
        .sidebar { 
            width: 380px; 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            background: var(--card); 
            z-index: 10;
        }

        .ui-header { 
            padding: 20px; 
            background: var(--header-bg); 
            border-bottom: 1px solid var(--border); 
        }

        .ui-header h1 { 
            margin: 0; 
            font-size: 1.4rem; 
            color: #fff; 
            letter-spacing: 1px; 
            font-weight: 800;
        }

        .ui-header p { 
            margin: 5px 0 0 0; 
            font-size: 0.7rem; 
            color: var(--accent); 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        .upload-zone { 
            padding: 12px; 
            background: #090c10; 
            border-bottom: 1px solid var(--border); 
            text-align: center;
        }

        #count { font-size: 0.75rem; color: var(--blue-grey); font-family: monospace; }

        .filter-pane { 
            padding: 15px; 
            flex-shrink: 0; 
            border-bottom: 1px solid var(--border);
        }

        select, input { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 8px; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 6px; 
            font-size: 0.85rem; 
            transition: border-color 0.2s;
        }

        select:focus, input:focus { border-color: var(--accent); outline: none; }

        #resetBtn { 
            width: 100%; 
            padding: 10px; 
            background: var(--border); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: bold;
            transition: background 0.2s;
        }

        #resetBtn:hover { background: #444; }

        .item-list { flex: 1; overflow-y: auto; contain: strict; }

        .item-row { 
            height: 64px; 
            padding: 0 20px; 
            border-bottom: 1px solid var(--border); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            position: relative; 
            transition: background 0.1s;
        }

        .item-row:hover { background: #21262d; }
        .item-row.active { border-left: 4px solid var(--accent); background: #1c2128; }

        .item-id { 
            display: block; 
            font-weight: bold; 
            font-size: 0.85rem; 
            color: #fff; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 280px;
        }

        .item-sub { 
            font-size: 0.7rem; 
            color: var(--blue-grey); 
            text-transform: uppercase; 
            margin-top: 2px;
        }

        .tier-tag { 
            position: absolute; 
            right: 15px; 
            color: var(--tier); 
            font-weight: 800; 
            font-size: 0.8rem; 
            background: rgba(241, 196, 15, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        /* CONTENT AREA */
        .content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            background: #0d1117; 
            position: relative; 
            scroll-behavior: smooth;
        }

        .content-header { 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 25px; 
            margin-bottom: 30px; 
        }

        .content-header h2 { 
            margin: 0; 
            color: #fff; 
            font-size: 2.2rem; 
            font-weight: 800;
        }
        
        .ip-controls { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 0.9rem; 
            color: var(--accent); 
            margin-top: 10px; 
            font-weight: 600; 
        }

        .ip-input { 
            width: 110px; 
            padding: 6px 10px; 
            margin: 0; 
            background: #090c10; 
            border: 1px solid var(--border); 
            color: #fff; 
            font-weight: bold; 
            font-family: monospace; 
            border-radius: 4px; 
            text-align: center;
        }
        
        /* TABS */
        .tab-container { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px; 
        }

        .tab-btn { 
            background: var(--collapse-bg); 
            border: 1px solid var(--border); 
            color: var(--blue-grey); 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: bold; 
            transition: all 0.2s; 
        }

        .tab-btn:hover { border-color: var(--accent); color: #fff; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(88, 166, 255, 0.2); }

        /* CALCULATOR */
        .calc-controls { 
            display: flex; 
            gap: 20px; 
            background: var(--header-bg); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 1px solid var(--border); 
            align-items: center;
        }

        .calc-input-group { display: flex; flex-direction: column; gap: 6px; }
        .calc-input-group label { font-size: 0.65rem; color: var(--blue-grey); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .calc-input { width: 130px; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 6px; font-weight: bold; font-family: monospace; }
        
        .calc-table { width: 100%; border-collapse: collapse; }
        .calc-table th { text-align: left; font-size: 0.7rem; color: var(--blue-grey); padding: 12px 8px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .calc-table td { padding: 14px 8px; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.03); }

        /* ATTRIBUTE CARDS */
        .attr-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 15px; 
        }

        .attr-box { 
            background: var(--card); 
            padding: 16px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            position: relative; 
            transition: transform 0.2s;
        }

        .attr-box:hover { border-color: var(--accent); }
        .combat-box { border: 1px solid rgba(255, 123, 114, 0.2); background: linear-gradient(145deg, rgba(255, 123, 114, 0.05), transparent); }
        .attr-label { display: block; font-size: 0.65rem; color: var(--blue-grey); text-transform: uppercase; margin-bottom: 6px; font-weight: bold; }
        .attr-val { font-family: "JetBrains Mono", monospace; color: var(--accent); font-size: 1rem; font-weight: 700; }
        
        /* SPELLS */
        .section-title { 
            color: var(--success); 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px; 
            margin: 50px 0 20px 0; 
            font-size: 1.2rem; 
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spell-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); 
            gap: 20px; 
        }

        .cosy-block { 
            background: var(--cosy-block); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #21262d; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .copy-btn { 
            background: #30363d; 
            border: 1px solid #444; 
            color: var(--blue-grey); 
            padding: 4px 8px; 
            font-size: 0.65rem; 
            cursor: pointer; 
            border-radius: 4px; 
            text-transform: uppercase; 
            font-weight: bold; 
            transition: all 0.2s;
        }

        .copy-btn:hover { color: #fff; background: var(--accent); border-color: var(--accent); }
        .tiny-copy { position: absolute; top: 15px; left: 15px; opacity: 0.4; z-index: 5; }
        .tiny-copy:hover { opacity: 1; }

        /* COLLAPSIBLE */
        .collapsible { 
            background: var(--collapse-bg); 
            color: white; 
            cursor: pointer; 
            padding: 18px; 
            width: 100%; 
            border: 1px solid var(--border); 
            text-align: left; 
            border-radius: 10px; 
            margin-top: 20px; 
            font-weight: 800; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.95rem;
        }

        .collapsible:after { content: '\002B'; color: var(--accent); font-size: 1.2rem; }
        .collapsible.active:after { content: "\2212"; }

        .collapsible-content { 
            padding: 25px; 
            display: none; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-top: none; 
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        
        .sub-spell-block { 
            margin-top: 12px; 
            border-left: 3px solid var(--combat); 
            padding-left: 15px; 
            background: rgba(255,255,255,0.02); 
            padding-bottom: 8px; 
            border-radius: 0 6px 6px 0;
        }

        .res-icon { width: 32px; height: 32px; object-fit: contain; }
        .item-icon-large { 
            width: 110px; 
            height: 110px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 15px; 
            padding: 5px; 
            border: 1px solid var(--border);
        }

        .grand-total { 
            margin-top: 20px; 
            padding-top: 15px; 
            border-top: 2px dashed var(--border); 
            text-align: right; 
            font-size: 1.2rem; 
            font-weight: 800; 
        }

        .price-input { 
            width: 110px; 
            padding: 8px; 
            border-radius: 4px; 
            border: 1px solid var(--border); 
            background: #090c10; 
            color: var(--tier); 
            text-align: right; 
            font-family: monospace; 
            font-weight: bold;
        }

        .val-up { color: var(--success); }
        .val-down { color: var(--upgrade); }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="ui-header">
        <h1>ITEMARY</h1>
        <p>Asset Inspector & Scaling Engine</p>
    </div>
    
    <div class="upload-zone">
        <div id="count">Connecting to data sources...</div>
    </div>

    <div class="filter-pane">
        <input type="text" id="search" placeholder="Search by name or UID...">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <select id="tierFilter">
                <option value="all">Any Tier</option>
            </select>
            <select id="tagFilter">
                <option value="all">Any Tag</option>
            </select>
        </div>
        <select id="catFilter">
            <option value="all">Any Category</option>
        </select>
        <button id="resetBtn">Clear Filters</button>
    </div>

    <div class="item-list" id="itemList"></div>
</div>

<div class="content" id="details">
    <div style="display: flex; flex-direction: column; height: 100%; align-items: center; justify-content: center; color: var(--blue-grey); text-align: center;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.2; margin-bottom: 20px;">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        <div style="font-size: 1.2rem; font-weight: bold;">No Item Selected</div>
        <div style="font-size: 0.85rem; max-width: 200px; margin-top: 10px;">Select an asset from the sidebar to inspect raw XML data and scaling.</div>
    </div>
</div>

<script>
    // --- STATE MANAGEMENT ---
    let items = [];
    let nameMap = {};
    let spellsMap = {};
    let progressionLookup = {};
    let filteredItems = [];
    let priceCache = JSON.parse(localStorage.getItem('itemary_prices')) || {};
    let batchSize = 1;
    let returnRate = 15.2;
    let currentProgType = "mainhand_1h";

    const statToProgressionMap = {
        'abilitypower': 'abilitypowerprogression',
        'attackdamage': 'attackdamageprogression',
        'hitpointsmax': 'hitpointsprogression',
        'physicalarmor': 'armorprogression',
        'magicresistance': 'armorprogression',
        'energymax': 'energyprogression',
        'ccpower': 'ccpowerprogression',
        'crowdcontrolresistance': 'crowdcontrolresistanceprogression'
    };

    // --- DATA PARSERS ---

    function processNames(text) {
        text.split(/\r?\n/).forEach(line => {
            const parts = line.split(':');
            if (parts.length >= 2) {
                const id = parts[0].trim();
                const name = parts.slice(1).join(':').trim();
                nameMap[id] = name;
            }
        });
    }

    function processSpells(xmlString) {
        const xml = new DOMParser().parseFromString(xmlString, "text/xml");
        const nodes = xml.documentElement.children;

        for (let node of nodes) {
            const uName = node.getAttribute('uniquename');
            if (!uName) continue;

            // Extract Direct Attribute Changes (Damage, Heals, etc)
            const changes = Array.from(node.querySelectorAll('directattributechange')).map(dac => ({
                target: dac.getAttribute('target'),
                attr: dac.getAttribute('attribute'),
                change: dac.getAttribute('change')
            }));

            // Extract Over Time Effects
            const buffs = Array.from(node.querySelectorAll('buffovertime, debuffovertime')).map(b => ({
                tag: b.nodeName,
                type: b.getAttribute('type'),
                target: b.getAttribute('target'),
                value: b.getAttribute('value'),
                time: b.getAttribute('time')
            }));

            // Extract Recursive Spell Triggers
            const subSpells = Array.from(node.querySelectorAll('applyspell, applyeffectoneventactive, pulsingspell')).map(s => ({
                id: s.getAttribute('spell'),
                event: s.getAttribute('event') || (s.nodeName === 'pulsingspell' ? 'Pulse' : 'On Cast')
            })).filter(s => s.id);

            spellsMap[uName] = {
                sprite: node.getAttribute('uisprite'),
                desc: node.getAttribute('descriptionlocatag') || "",
                recast: node.getAttribute('recastdelay'),
                energy: node.getAttribute('energyusage'),
                cast: node.getAttribute('castingtime'),
                changes, 
                buffs, 
                subSpells
            };
        }
    }

    function processXML(xmlString) {
        const xml = new DOMParser().parseFromString(xmlString, "text/xml");
        const root = xml.documentElement;
        
        // Map Progression Templates (Base Scaling)
        const progTypes = ['mainhand_1h', 'mainhand_2h', 'offhand', 'head', 'armor', 'shoes', 'bag', 'cape', 'mount', 'potion', 'food'];
        
        for (let node of root.children) {
            const nodeName = node.nodeName.toLowerCase();
            
            // Handle Progression Templates
            if (progTypes.includes(nodeName)) {
                const traits = {};
                for (let a of node.attributes) traits[a.name.toLowerCase()] = a.value;
                progressionLookup[nodeName] = traits;
            }

            // Handle Item Definitions
            const attr = {};
            for (let a of node.attributes) attr[a.name.toLowerCase()] = a.value;

            if (attr.uniquename) {
                // Spell Extraction
                const spellListEl = node.querySelector('craftingspelllist');
                let spells = [];
                let spellRef = spellListEl ? spellListEl.getAttribute('reference') : null;
                
                if (spellListEl) {
                    spells = Array.from(spellListEl.querySelectorAll('craftspell')).map(s => ({
                        id: s.getAttribute('uniquename'),
                        slot: s.getAttribute('slots'),
                        tag: s.getAttribute('tag')
                    }));
                }

                // Crafting Methods
                const baseMethods = Array.from(node.querySelectorAll(':scope > craftingrequirements')).map(cr => ({
                    amount: parseInt(cr.getAttribute('amountcrafted') || "1"),
                    resources: Array.from(cr.querySelectorAll('craftresource')).map(r => ({
                        name: r.getAttribute('uniquename'),
                        count: parseInt(r.getAttribute('count'))
                    }))
                }));

                // Enchantment Logic
                const enchantments = Array.from(node.querySelectorAll('enchantment')).map(e => ({
                    level: e.getAttribute('enchantmentlevel'),
                    resources: Array.from(e.querySelectorAll('craftresource')).map(r => ({
                        name: r.getAttribute('uniquename'),
                        count: parseInt(r.getAttribute('count'))
                    }))
                }));

                items.push({
                    id: attr.uniquename, 
                    tag: node.nodeName, 
                    tier: attr.tier || "0",
                    cat: attr.shopcategory || "none",
                    sub: attr.shopsubcategory1 || "none",
                    all: attr, 
                    baseMethods, 
                    enchantments,
                    spellList: spells,
                    spellRef: spellRef
                });
            }
        }
        initFilters();
        runFilter();
    }

    // --- RENDERING ENGINE ---

    function getSpellHtml(spellId, currentIP, slotLabel = "") {
        const data = spellsMap[spellId];
        if (!data) return '';

        const template = progressionLookup[currentProgType] || {};
        const pFactor = parseFloat(template['abilitypowerprogression']) || 1.0825;
        const eFactor = parseFloat(template['energyprogression']) || 1.0918;

        const energy = data.energy ? (parseFloat(data.energy) * Math.pow(eFactor, currentIP / 100)).toFixed(1) : null;

        const changesHtml = data.changes.map(c => {
            const base = parseFloat(c.change);
            const scaled = isNaN(base) ? c.change : (base * Math.pow(pFactor, currentIP / 100)).toFixed(1);
            return `<div style="color:var(--combat); margin-top:4px;">${c.target} ${c.attr}: <b>${scaled}</b></div>`;
        }).join('');

        const buffsHtml = data.buffs.map(b => `
            <div style="color:var(--success); margin-top:4px; font-size:0.7rem;">
                [${b.tag.toUpperCase()}] ${b.type} -> ${b.value} (${b.time}s)
            </div>
        `).join('');

        const subHtml = data.subSpells.map(sub => `
            <div class="sub-spell-block">
                <div style="font-size:0.6rem; color:var(--accent); font-weight:800; text-transform:uppercase;">Proc Event: ${sub.event}</div>
                ${getSpellHtml(sub.id, currentIP)}
            </div>
        `).join('');

        return `
            <div class="attr-box">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                    <img src="https://render.albiononline.com/v1/spell/${data.sprite}.png" class="res-icon" onerror="this.src='https://render.albiononline.com/v1/spell/TEMP.png'">
                    <div>
                        <div class="attr-val" style="color:#fff; font-size:0.9rem;">${nameMap[spellId] || spellId}</div>
                        ${slotLabel ? `<span class="attr-label" style="margin:0">${slotLabel}</span>` : ''}
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; font-size:0.7rem; color:var(--blue-grey); background: rgba(0,0,0,0.2); padding:5px; border-radius:4px;">
                    <div>CD: <b>${data.recast || '0'}s</b></div>
                    <div>Energy: <b>${energy || '0'}</b></div>
                </div>
                <div style="margin-top:10px; border-top:1px solid #333; padding-top:5px;">
                    ${changesHtml}
                    ${buffsHtml}
                </div>
                ${subHtml}
            </div>
        `;
    }

    function view(id, overrideIP = null, enchantLevel = 0) {
        const item = items.find(i => i.id === id);
        if (!item) return;

        // UI Highlighting
        document.querySelectorAll('.item-row').forEach(r => r.classList.remove('active'));
        const row = Array.from(document.querySelectorAll('.item-row')).find(r => r.innerText.includes(id));
        if (row) row.classList.add('active');

        // Logic & Scaling Prep
        const rawProg = (item.all['itempowerprogressiontype'] || "").toLowerCase();
        currentProgType = rawProg || (item.all['twohanded'] === "true" ? "mainhand_2h" : "mainhand_1h");
        
        const baseIP = (parseFloat(item.all['itempower']) || 0) + (enchantLevel * 100);
        
        let itemSpells = item.spellList;
        if (item.spellRef) {
            const refItem = items.find(i => i.id === item.spellRef);
            if (refItem) itemSpells = refItem.spellList;
        }

        const container = document.getElementById('details');
        container.innerHTML = `
            <button class="copy-btn tiny-copy" onclick="copyToClipboard('${item.id}', this)">Copy UID</button>
            
            <div class="tab-container">
                <button class="tab-btn ${enchantLevel === 0 ? 'active' : ''}" onclick="view('${item.id}', null, 0)">Flat</button>
                ${item.enchantments.map(e => `
                    <button class="tab-btn ${enchantLevel == e.level ? 'active' : ''}" onclick="view('${item.id}', null, ${e.level})">.${e.level}</button>
                `).join('')}
            </div>

            <div class="content-header">
                <div style="display:flex; gap:25px; align-items:center;">
                    <img class="item-icon-large" src="https://render.albiononline.com/v1/item/${item.id}${enchantLevel > 0 ? '@'+enchantLevel : ''}.png">
                    <div>
                        <h2>${nameMap[item.id] || item.id}</h2>
                        <div class="ip-controls">
                            <span>Base Item Power: <b>${baseIP}</b></span>
                            <span style="color:var(--border)">|</span>
                            <span>Target IP Scaling: <input type="number" id="ipOverride" class="ip-input" value="${overrideIP || baseIP}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="combatSection"></div>
            <div id="spellSection"></div>

            <h3 class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                Crafting & Profit Calculator
            </h3>
            
            <div class="calc-controls">
                <div class="calc-input-group">
                    <label>Batch Size</label>
                    <input type="number" id="batchSizeInput" class="calc-input" value="${batchSize}">
                </div>
                <div class="calc-input-group">
                    <label>Resource Return %</label>
                    <input type="number" id="rrrInput" class="calc-input" step="0.1" value="${returnRate}">
                </div>
            </div>

            <div class="cosy-block">
                <table class="calc-table">
                    <thead>
                        <tr>
                            <th>Resource Name</th>
                            <th style="text-align:right">Silver Price</th>
                            <th style="text-align:right">Net Required</th>
                            <th style="text-align:right">Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="calcBody"></tbody>
                </table>
                <div class="grand-total">Estimated Total Cost: <span id="grandTotal" style="color:var(--tier)">0</span> <span style="font-size:0.7rem; color:var(--blue-grey)">SILVER</span></div>
            </div>

            <button class="collapsible" onclick="toggleCollapse(this)">Deep XML Inspector (All Attributes)</button>
            <div class="collapsible-content">
                <div class="attr-grid">
                    ${Object.keys(item.all).sort().map(k => `
                        <div class="attr-box">
                            <span class="attr-label">${k}</span>
                            <span class="attr-val" style="font-size:0.8rem">${item.all[k]}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        // Update Scaling Stats Logic
        const refreshStats = (val) => {
            const targetIP = parseFloat(val) || baseIP;
            const template = progressionLookup[currentProgType] || {};

            const combatHtml = Object.keys(statToProgressionMap).filter(k => item.all[k] || k === 'hitpointsmax').map(k => {
                const baseStat = parseFloat(item.all[k]) || 0;
                const factor = parseFloat(template[statToProgressionMap[k]]) || 1.0825;
                
                // Specific formula for Armor HP scaling (Armor base is offset by 600)
                let final = baseStat * Math.pow(factor, targetIP / 100);
                if (k === 'hitpointsmax' && item.tag === 'armor') {
                    final = (baseStat + 600) * Math.pow(factor, targetIP / 100) - 600;
                }
                
                return final > 0 ? `
                    <div class="attr-box combat-box">
                        <span class="attr-label">${k.replace('max', '')}</span>
                        <span class="attr-val">${final.toLocaleString(undefined, {maximumFractionDigits: 1})}</span>
                    </div>
                ` : '';
            }).join('');

            document.getElementById('combatSection').innerHTML = `
                <h3 class="section-title">Combat Stats (Scaled)</h3>
                <div class="attr-grid">${combatHtml}</div>
            `;

            // Spells
            const spellsHtml = itemSpells.map(s => getSpellHtml(s.id, targetIP, s.slot)).join('');
            document.getElementById('spellSection').innerHTML = itemSpells.length ? `
                <h3 class="section-title">Spell Scaling & Procs</h3>
                <div class="spell-grid">${spellsHtml}</div>
            ` : '';
        };

        const refreshCalc = () => {
            const resList = enchantLevel > 0 
                ? (item.enchantments.find(e => e.level == enchantLevel)?.resources || []) 
                : (item.baseMethods[0]?.resources || []);
            
            let totalSilver = 0;
            const body = document.getElementById('calcBody');
            
            body.innerHTML = resList.map(r => {
                const net = Math.ceil((r.count * batchSize) * (1 - (returnRate / 100)));
                const price = priceCache[r.name] || 0;
                const sub = net * price;
                totalSilver += sub;
                
                return `
                    <tr>
                        <td style="font-weight:bold; color:#fff;">${nameMap[r.name] || r.name}</td>
                        <td style="text-align:right">
                            <input type="number" class="price-input" data-res="${r.name}" value="${price}">
                        </td>
                        <td style="text-align:right; font-family:monospace; color:var(--success)">${net.toLocaleString()}</td>
                        <td style="text-align:right; font-family:monospace; font-weight:bold; color:var(--tier)">${sub.toLocaleString()}</td>
                    </tr>
                `;
            }).join('');

            document.getElementById('grandTotal').innerText = totalSilver.toLocaleString();

            // Price Change Listeners
            body.querySelectorAll('.price-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const res = e.target.dataset.res;
                    priceCache[res] = parseFloat(e.target.value) || 0;
                    localStorage.setItem('itemary_prices', JSON.stringify(priceCache));
                    refreshCalc();
                });
            });
        };

        refreshStats(overrideIP || baseIP);
        refreshCalc();

        // Global Listeners for the Item View
        document.getElementById('ipOverride').addEventListener('input', e => refreshStats(e.target.value));
        document.getElementById('batchSizeInput').addEventListener('input', e => { batchSize = e.target.value; refreshCalc(); });
        document.getElementById('rrrInput').addEventListener('input', e => { returnRate = e.target.value; refreshCalc(); });
    }

    // --- UTILITIES & FILTERS ---

    function initFilters() {
        const getSet = (key) => [...new Set(items.map(i => i[key]))].sort();
        
        const tFilter = document.getElementById('tierFilter');
        getSet('tier').forEach(t => tFilter.innerHTML += `<option value="${t}">Tier ${t}</option>`);
        
        const tagFilter = document.getElementById('tagFilter');
        getSet('tag').forEach(tag => tagFilter.innerHTML += `<option value="${tag}">${tag}</option>`);

        const catFilter = document.getElementById('catFilter');
        getSet('cat').forEach(cat => catFilter.innerHTML += `<option value="${cat}">${cat}</option>`);
    }

    function runFilter() {
        const search = document.getElementById('search').value.toLowerCase();
        const tier = document.getElementById('tierFilter').value;
        const tag = document.getElementById('tagFilter').value;
        const cat = document.getElementById('catFilter').value;

        filteredItems = items.filter(i => {
            const matchesSearch = (nameMap[i.id] || "").toLowerCase().includes(search) || i.id.toLowerCase().includes(search);
            const matchesTier = tier === 'all' || i.tier === tier;
            const matchesTag = tag === 'all' || i.tag === tag;
            const matchesCat = cat === 'all' || i.cat === cat;
            return matchesSearch && matchesTier && matchesTag && matchesCat;
        });

        document.getElementById('count').innerText = `Total Assets: ${items.length} | Matches: ${filteredItems.length}`;
        
        document.getElementById('itemList').innerHTML = filteredItems.slice(0, 150).map(i => `
            <div class="item-row" onclick="view('${i.id}')">
                <span class="item-id">${nameMap[i.id] || i.id}</span>
                <span class="item-sub">${i.cat} > ${i.sub}</span>
                <span class="tier-tag">T${i.tier}</span>
            </div>
        `).join('');
    }

    function toggleCollapse(btn) {
        btn.classList.toggle('active');
        const content = btn.nextElementSibling;
        content.style.display = content.style.display === "block" ? "none" : "block";
    }

    async function copyToClipboard(text, btn) {
        await navigator.clipboard.writeText(text);
        const original = btn.innerText;
        btn.innerText = "COPIED!";
        btn.style.background = "var(--success)";
        setTimeout(() => {
            btn.innerText = original;
            btn.style.background = "";
        }, 1200);
    }

    // --- BOOTSTRAP ---
    window.addEventListener('DOMContentLoaded', async () => {
        const resetBtn = document.getElementById('resetBtn');
        resetBtn.onclick = () => {
            document.querySelectorAll('select').forEach(s => s.value = 'all');
            document.getElementById('search').value = '';
            runFilter();
        };

        // Listen for filter changes
        ['tierFilter', 'tagFilter', 'catFilter', 'search'].forEach(id => {
            document.getElementById(id).addEventListener('input', runFilter);
        });

        try {
            const [xmlText, namesText, spellsText] = await Promise.all([
                fetch('items.xml').then(r => r.text()),
                fetch('items.txt').then(r => r.text()),
                fetch('spells.xml').then(r => r.text())
            ]);

            processNames(namesText);
            processSpells(spellsText);
            processXML(xmlText);
        } catch (err) {
            document.getElementById('count').innerText = "FATAL: Could not fetch local assets.";
            console.error(err);
        }
    });
</script>
</body>
</html>
