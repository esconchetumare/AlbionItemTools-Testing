<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itemary - Albion Assets Inspector</title>
    <style>
        @media (max-width: 768px) {
            body { flex-direction: column; height: 100dvh; }
            .sidebar { width: 100%; height: 40%; border-right: none; border-bottom: 2px solid var(--accent); flex: none; }
            .content { width: 100%; height: 60%; flex: none; padding: 15px; box-sizing: border-box; overflow-y: auto;}
            .ui-header { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
            .ui-header input[type="text"] { grid-column: span 2; }
            #resetBtn { grid-column: span 2; padding: 8px; margin-top: 4px; }
            .ui-header select, .ui-header input { margin: 0; width: 100%; box-sizing: border-box; padding: 8px; height: 38px;}
            .content-header > div { flex-direction: column; align-items: center; text-align: center; }
            .title-row { justify-content: center; flex-wrap: wrap; }
            .ip-controls { justify-content: center; flex-wrap: wrap; gap: 8px; }
            .tab-container { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 10px; white-space: nowrap; }
            .calc-controls { flex-direction: column; gap: 12px; }
            .calc-input-group { width: 100%; }
            .calc-input, .calc-select { width: 100%; box-sizing: border-box; }
            .calc-table { display: block; overflow-x: auto; white-space: nowrap; }
            .attr-grid { grid-template-columns: 1fr; }
            .enchant-methods-wrapper { flex-direction: column; }
            .cosy-block { min-width: 100%; box-sizing: border-box; }
        }
        :root { 
            --bg: #0d1117; --card: #161b22; --accent: #58a6ff; 
            --text: #c9d1d9; --border: #30363d; --tier: #f1c40f; 
            --header-bg: #1c2128; --resource: #ffa657; --upgrade: #f85149;
            --collapse-bg: #21262d; --combat: #ff7b72;
            --cosy-block: #141920;
            --blue-grey: #8b949e;
            --silver: #bdc3c7;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--card); }
        .ui-header { padding: 20px; background: var(--header-bg); border-bottom: 1px solid var(--border); }
        .ui-header h1 { margin: 0; font-size: 1.4rem; color: #fff; letter-spacing: 1px; }
        .ui-header p { margin: 5px 0 0 0; font-size: 0.75rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .upload-zone { padding: 15px; background: #090c10; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .filter-pane { padding: 15px; flex-shrink: 0; }
        select, input { width: 100%; padding: 10px; margin-bottom: 8px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 0.85rem; box-sizing: border-box; }
        #resetBtn { width: 100%; padding: 10px; background: var(--border); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; margin-top: 5px; }
        .item-list { flex: 1; overflow-y: auto; contain: strict; }
        .item-row { height: 60px; padding: 0 20px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .item-row:hover { background: #21262d; }
        .item-id { display: block; font-weight: bold; font-size: 0.85rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-sub { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        .tier-tag { position: absolute; right: 15px; color: var(--tier); font-weight: bold; font-size: 0.8rem; }
        .content { flex: 1; overflow-y: auto; padding: 40px; background: #0d1117; position: relative; }
        .content-header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
        .title-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .content-header h2 { margin: 0; color: #fff; font-size: 2rem; }
        .ip-controls { display: flex; align-items: center; gap: 15px; font-size: 0.85rem; color: var(--accent); margin-top: 5px; font-weight: 500; }
        .ip-controls b { color: #fff; }
        .ip-divider { color: var(--border); font-weight: normal; }
        .ip-input { width: 100px; padding: 4px 8px; margin: 0; background: #090c10; border: 1px solid var(--border); color: #fff; font-weight: bold; font-family: monospace; border-radius: 4px; }
        .tab-container { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .tab-btn { background: var(--collapse-bg); border: 1px solid var(--border); color: #8b949e; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: all 0.2s; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .calc-controls { display: flex; gap: 20px; background: var(--header-bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); flex-wrap: wrap; }
        .calc-input-group { display: flex; flex-direction: column; gap: 5px; }
        .calc-input-group label { font-size: 0.7rem; color: var(--blue-grey); text-transform: uppercase; font-weight: bold; }
        .calc-input { width: 120px; padding: 8px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 4px; font-weight: bold; margin-bottom: 0; }
        .calc-select { width: 180px; padding: 8px; background: var(--bg); border: 1px solid var(--border); color: #fff; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .calc-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .calc-table th { text-align: left; font-size: 0.7rem; color: var(--blue-grey); padding: 8px; border-bottom: 1px solid var(--border); }
        .calc-table td { padding: 10px 8px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .res-total { color: var(--accent); font-family: monospace; font-weight: bold; }
        .res-net { color: #3fb950; font-family: monospace; font-weight: bold; }
        .res-cost { color: var(--tier); font-family: monospace; font-weight: bold; }
        .price-input { width: 100px; padding: 6px; background: #090c10; border: 1px solid var(--border); color: var(--tier); font-weight: bold; border-radius: 4px; text-align: right; margin: 0; font-family: monospace; }
        .attr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .attr-box { background: var(--card); padding: 12px; border: 1px solid var(--border); border-radius: 8px; }
        .combat-box { border: 1px solid rgba(255, 123, 114, 0.3); background: rgba(255, 123, 114, 0.03); }
        .attr-label { display: block; font-size: 0.65rem; color: #8b949e; text-transform: uppercase; margin-bottom: 4px; }
        .combat-label { color: var(--combat); font-weight: bold; }
        .attr-val { font-family: 'SFMono-Regular', monospace; color: var(--accent); font-size: 0.9rem; word-break: break-all; font-weight: 600; }
        .formula-info { font-size: 0.65rem; color: #8b949e; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 4px; line-height: 1.4; }
        .section-title { color: #3fb950; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin: 40px 0 15px 0; font-size: 1.1rem; }
        .enchant-methods-wrapper { display: flex; gap: 12px; align-items: stretch; margin-bottom: 15px; flex-wrap: wrap; }
        .cosy-block { background: var(--cosy-block); padding: 16px; border-radius: 8px; border: 1px solid #21262d; flex: 1; min-width: 280px; position: relative; }
        .method-label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; font-weight: bold; }
        .recipe-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
        .res-name-wrapper { display: flex; align-items: center; gap: 8px; overflow: hidden; }
        .res-name { font-size: 0.75rem; color: var(--resource); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .res-name.upgrade { color: var(--upgrade); }
        .res-count { color: #fff; font-family: monospace; font-size: 0.75rem; font-weight: bold; margin-left: 10px; }
        .copy-btn { background: #30363d; border: 1px solid #444; color: #8b949e; padding: 2px 6px; font-size: 0.6rem; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: all 0.2s; min-width: 65px; text-align: center; font-weight: bold; flex-shrink: 0; }
        .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .tiny-copy { position: absolute; top: 10px; left: 10px; padding: 2px 4px; font-size: 0.5rem; min-width: auto; opacity: 0.6; z-index: 10; }
        .collapsible { background: var(--collapse-bg); color: white; cursor: pointer; padding: 15px; width: 100%; border: 1px solid var(--border); text-align: left; outline: none; font-size: 1rem; font-weight: bold; border-radius: 8px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .collapsible:after { content: '\002B'; color: var(--accent); font-weight: bold; }
        .active-collapse:after { content: "\2212"; }
        .collapsible-content { padding: 20px; display: none; background: var(--card); border: 1px solid var(--border); border-top: none; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        .item-icon-large { width: 120px; height: 120px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); }
        .res-icon { width: 24px; height: 24px; object-fit: contain; border-radius: 4px; }
        .empty { display: flex; height: 100%; align-items: center; justify-content: center; color: #8b949e; font-style: italic; }
        .grand-total { border-top: 2px solid var(--border); padding-top: 15px; margin-top: 15px; text-align: right; font-size: 1.1rem; color: #fff; font-weight: bold; }
        .grand-val { color: var(--tier); font-family: monospace; }
        .spell-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-top: 10px; }
        .spell-tag { font-size: 0.6rem; background: var(--accent); color: white; padding: 2px 4px; border-radius: 3px; vertical-align: middle; margin-left: 5px; text-transform: uppercase; }
        .spell-stat-line { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .spell-stat-label { color: var(--blue-grey); }
        .spell-stat-val { color: var(--combat); font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="ui-header">
        <h1>ITEMARY</h1>
        <p>Combat Inspector</p>
    </div>
    <div class="upload-zone">
        <div id="count" style="font-size: 0.7rem; color: #8b949e; text-align: center;">Fetching local project files...</div>
    </div>
    <div class="filter-pane">
        <input type="text" id="search" placeholder="Search items...">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <select id="tierFilter"><option value="all">Tier</option></select>
            <select id="tagFilter"><option value="all">Tag</option></select>
        </div>
        <select id="catFilter"><option value="all">Category</option></select>
        <select id="subCatFilter"><option value="all">Sub-Type</option></select>
        <button id="resetBtn">Reset Filters</button>
    </div>
    <div class="item-list" id="itemList"></div>
</div>

<div class="content" id="details">
    <div class="empty">Waiting for items.xml...</div>
</div>

<script>
    let items = [];
    let nameMap = {};
    let progressionLookup = {}; 
    let filteredItems = [];
    let displayedCount = 80;
    const listEl = document.getElementById('itemList');
    let batchSize = 1;
    let returnRate = 0;
    let priceCache = JSON.parse(localStorage.getItem('itemary_prices')) || {};
    let spellsMap = {};

    const statToProgressionMap = {
        'abilitypower': 'abilitypowerprogression',
        'attackdamage': 'attackdamageprogression',
        'hitpointsmax': 'hitpointsprogression',
        'physicalarmor': 'armorprogression',
        'magicresistance': 'armorprogression',
        'energymax': 'energyprogression',
        'ccpower': 'ccpowerprogression',
        'crowdcontrolresistance': 'crowdcontrolresistanceprogression',
        'fishingspeed': 'fishingspeedprogression'
    };

    function processNames(text) {
        const lines = text.split(/\r?\n/);
        nameMap = {};
        lines.forEach(line => {
            const parts = line.split(':');
            if (parts.length >= 2) nameMap[parts[0].trim()] = parts.slice(1).join(':').trim();
        });
        runFilter();
    }

    function deduplicateResources(nodes) {
        const seen = new Set();
        const unique = [];
        nodes.forEach(node => {
            const name = node.getAttribute('uniquename');
            const level = node.getAttribute('enchantmentlevel') || "0";
            const maxReturn = node.getAttribute('maxreturnamount');
            const combinedKey = `${name}@${level}`;
            if (!seen.has(combinedKey)) {
                seen.add(combinedKey);
                const effectiveName = level !== "0" ? `${name}@${level}` : name;
                unique.push({ 
                    name: effectiveName, 
                    count: parseInt(node.getAttribute('count')),
                    maxReturn: maxReturn !== null ? parseInt(maxReturn) : null 
                });
            }
        });
        return unique;
    }

    function processXML(xmlString) {
        const xml = new DOMParser().parseFromString(xmlString, "text/xml");
        const root = xml.documentElement;
        items = [];
        progressionLookup = {};
        const progTypes = ['mainhand_1h', 'mainhand_2h', 'offhand', 'head', 'armor', 'shoes', 'bag', 'cape', 'mount', 'potion', 'food', 'transformation', 'legendaryitemtraits'];

        // PASS 1: Collection
        for (let node of root.children) {
            const nodeName = node.nodeName.toLowerCase();
            if (progTypes.includes(nodeName)) {
                const traits = {};
                for (let a of node.attributes) traits[a.name.toLowerCase()] = a.value;
                progressionLookup[nodeName] = traits;
                continue;
            }
            if (nodeName === "shopcategories" || nodeName === "itempowerprogression") continue;
            
            const attr = {};
            for (let a of node.attributes) attr[a.name.toLowerCase()] = a.value;
            if (attr.uniquename) {
                const uid = attr.uniquename;
                const baseMethods = Array.from(node.querySelectorAll(':scope > craftingrequirements')).map(cr => ({
                    amountCrafted: parseInt(cr.getAttribute('amountcrafted') || "1"),
                    resources: deduplicateResources(Array.from(cr.querySelectorAll('craftresource')))
                }));

                const enchantments = Array.from(node.querySelectorAll('enchantment')).map(e => ({
                    level: e.getAttribute('enchantmentlevel'),
                    id: uid + "@" + e.getAttribute('enchantmentlevel'),
                    craftingMethods: Array.from(e.querySelectorAll('craftingrequirements')).map(cr => ({
                        amountCrafted: parseInt(cr.getAttribute('amountcrafted') || "1"),
                        resources: deduplicateResources(Array.from(cr.querySelectorAll('craftresource')))
                    })),
                    upgrading: deduplicateResources(Array.from(e.querySelectorAll('upgraderequirements > upgraderesource')))
                }));
                
                const spellListEl = node.querySelector('craftingspelllist');
                let localSpells = [];
                let removedSpells = [];
                let spellRef = null;

                if (spellListEl) {
                    spellRef = spellListEl.getAttribute('reference');
                    localSpells = Array.from(spellListEl.querySelectorAll('craftspell')).map(s => ({
                        id: s.getAttribute('uniquename'),
                        slot: s.getAttribute('slots'),
                        tag: s.getAttribute('tag')
                    }));
                    removedSpells = Array.from(spellListEl.querySelectorAll('removespell')).map(s => s.getAttribute('uniquename'));
                }

                items.push({
                    id: uid, tag: node.nodeName, tier: attr.tier || "0",
                    cat: (attr.shopcategory || "none").toLowerCase(), 
                    sub: (attr.shopsubcategory1 || "none").toLowerCase(),
                    all: attr, slotType: (attr.slottype || "").toLowerCase(),
                    baseMethods: baseMethods,
                    enchantments: enchantments.length ? enchantments : null,
                    localSpells: localSpells,
                    removedSpells: removedSpells,
                    spellRef: spellRef
                });
            }
        }

        // PASS 2: Recursive Spell Resolution
        const resolveSpells = (item, visited = new Set()) => {
            if (visited.has(item.id)) return []; 
            visited.add(item.id);

            let baseList = [];
            if (item.spellRef) {
                const refItem = items.find(i => i.id === item.spellRef);
                if (refItem) baseList = resolveSpells(refItem, visited);
            }

            let resolved = baseList.filter(s => !item.removedSpells.includes(s.id));
            item.localSpells.forEach(ls => {
                const idx = resolved.findIndex(r => r.id === ls.id);
                if (idx > -1) resolved[idx] = ls;
                else resolved.push(ls);
            });
            return resolved;
        };

        items.forEach(item => { item.resolvedSpells = resolveSpells(item); });
        initFilters();
        runFilter();
    }
    
    function processSpells(xmlString) {
        const xml = new DOMParser().parseFromString(xmlString, "text/xml");
        const root = xml.documentElement;
        for (let node of root.children) {
            const name = node.getAttribute('uniquename');
            if (name) {
                const changes = Array.from(node.querySelectorAll('directattributechange')).map(dac => ({
                    target: dac.getAttribute('target'),
                    attr: dac.getAttribute('attribute'),
                    change: dac.getAttribute('change'),
                    type: dac.getAttribute('effecttype')
                }));
                spellsMap[name] = {
                    name: name, sprite: node.getAttribute('uisprite'),
                    desc: node.getAttribute('descriptionlocatag') || "",
                    type: node.nodeName === 'activespell' ? 'Active' : 'Passive',
                    recast: node.getAttribute('recastdelay'),
                    energy: node.getAttribute('energyusage'),
                    cast: node.getAttribute('castingtime'),
                    hit: node.getAttribute('hitdelay'),
                    stand: node.getAttribute('standtime'),
                    changes: changes
                };
            }
        }
    }
    
    function formatSpellDesc(text) {
        if (!text) return "No description available.";
        return text.replace(/\[\/?\w+\]/g, '').replace(/@SPELLS_/, '').replace(/_/g, ' ');
    }

    async function copyToClipboard(text, btn) {
        try {
            await navigator.clipboard.writeText(text);
            const oldText = btn.innerText;
            btn.innerText = "COPIED";
            setTimeout(() => { btn.innerText = oldText; }, 1000);
        } catch (err) { console.error('Failed to copy: ', err); }
    }

    function formatCopyName(resId) {
        const tierMatch = resId.match(/^T(\d)/i);
        const tierNum = tierMatch ? tierMatch[1] : "";
        const levelMatch = resId.match(/(?:LEVEL|@)(\d+)$/i);
        const enchantNum = levelMatch ? levelMatch[1] : "0";
        const levelSuffix = enchantNum !== "0" ? ` ${enchantNum}` : "";
        if (nameMap[resId]) return `${tierNum} ${nameMap[resId]}${levelSuffix}`.trim();
        const baseId = resId.replace(/(_LEVEL\d+|@\d+)$/i, '');
        let commonName = nameMap[baseId] || baseId.replace(/^T\d_/, '').replace(/_/g, ' ');
        return `${tierNum} ${commonName}${enchantNum !== "0" ? ' .' + enchantNum : ''}`.trim();
    }

    function getRenderId(id) { return id.replace('.', '@'); }

    function renderRecipeRow(res, isUpgrade = false) {
        const stringToCopy = formatCopyName(res.name).replace(/'/g, "\\'");
        let displayLabel = nameMap[res.name] || nameMap[res.name.replace(/(_LEVEL\d+|@\d+)$/i, '')] || formatCopyName(res.name);
        displayLabel = displayLabel.replace(/^T\d(\.\d)?\s*/i, '').replace(/\s*Level\s*\d+\s*/gi, '').trim();
        const imageId = getRenderId(res.name);
        return `
            <div class="recipe-row">
                <div class="res-name-wrapper">
                    <button class="copy-btn" onclick="copyToClipboard('${stringToCopy}', this)">Copy</button>
                    <img class="res-icon" src="https://render.albiononline.com/v1/item/${imageId}.png" onerror="this.style.display='none'">
                    <span class="res-name ${isUpgrade ? 'upgrade' : ''}" onclick="view('${res.name.split('@')[0]}')" style="cursor: pointer; text-decoration: underline dotted;">${displayLabel}</span>
                </div>
                <span class="res-count">x${res.count}</span>
            </div>
        `;
    }

    function actualizeCalculator(item, activeEnchant = null) {
        const tableBody = document.getElementById('calcTableBody');
        const yieldDisplay = document.getElementById('yieldDisplay');
        const grandTotalDisplay = document.getElementById('grandTotalValue');
        if (!tableBody || !item) return;
        const method = activeEnchant ? (activeEnchant.craftingMethods[0] || null) : (item.baseMethods[0] || null);
        if (!method) return;
        const amountCrafted = method.amountCrafted || 1;
        const totalItemsProduced = amountCrafted * batchSize;
        if(yieldDisplay) yieldDisplay.innerHTML = `Total Items Produced: <span style="color:#fff">${totalItemsProduced}</span> <small>(${amountCrafted} per craft)</small>`;
        let runningGrandTotal = 0;
        tableBody.innerHTML = method.resources.map(res => {
            const initialNeeded = res.count * batchSize;
            let net = res.maxReturn !== null ? Math.ceil(( (res.count - Math.min(res.count, res.maxReturn)) + (Math.min(res.count, res.maxReturn) * (1 - (returnRate / 100))) ) * batchSize) : Math.ceil(initialNeeded * (1 - (returnRate / 100)));
            const currentPrice = priceCache[res.name] || 0;
            const rowTotalCost = net * currentPrice;
            runningGrandTotal += rowTotalCost;
            let displayLabel = (nameMap[res.name] || formatCopyName(res.name)).replace(/^T\d(\.\d)?\s*/i, '').replace(/\s*Level\s*\d+\s*/gi, '').trim();
            return `<tr><td><div style="display:flex; align-items:center; gap:8px;"><img class="res-icon" src="https://render.albiononline.com/v1/item/${getRenderId(res.name)}.png" onerror="this.style.display='none'"><span style="color: var(--resource)">${displayLabel}</span></div></td><td><input type="number" class="price-input" data-res="${res.name}" value="${currentPrice}" min="0"></td><td class="res-total">${initialNeeded}</td><td class="res-net">${net}</td><td class="res-cost">${rowTotalCost.toLocaleString()}</td></tr>`;
        }).join('') || '<tr><td colspan="5">No recipe data available</td></tr>';
        
        const unitCostDisplay = document.getElementById('unitCostValue');
        const netLeftHeader = document.getElementById('netLeftHeader');
        if(netLeftHeader) netLeftHeader.innerText = batchSize === 1 ? 'Left' : 'Net';
        if(grandTotalDisplay) grandTotalDisplay.innerText = runningGrandTotal.toLocaleString();
        if(unitCostDisplay) unitCostDisplay.innerText = totalItemsProduced > 0 ? Math.ceil(runningGrandTotal / totalItemsProduced).toLocaleString() : "0";

        tableBody.querySelectorAll('.price-input').forEach(input => {
            input.addEventListener('input', (e) => {
                const resName = e.target.getAttribute('data-res');
                priceCache[resName] = parseFloat(e.target.value) || 0;
                localStorage.setItem('itemary_prices', JSON.stringify(priceCache));
                const row = e.target.closest('tr');
                row.querySelector('.res-cost').innerText = (parseInt(row.querySelector('.res-net').innerText) * priceCache[resName]).toLocaleString();
                let newGrand = 0;
                tableBody.querySelectorAll('.res-cost').forEach(c => newGrand += parseInt(c.innerText.replace(/,/g, '')) || 0);
                grandTotalDisplay.innerText = newGrand.toLocaleString();
                if(unitCostDisplay) unitCostDisplay.innerText = totalItemsProduced > 0 ? Math.ceil(newGrand / totalItemsProduced).toLocaleString() : "0";
            });
        });
    }

    function view(id, overrideIP = null, enchantLevel = 0) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        const variations = items.filter(i => i.id.replace(/^T\d_/, '') === item.id.replace(/^T\d_/, '') && i.id !== item.id).sort((a, b) => parseInt(a.tier) - parseInt(b.tier));
        let progType = (item.all['itempowerprogressiontype'] || "").toLowerCase();
        if (!progType && item.id.includes('FISHINGROD')) progType = 'mainhand_2h';
        else if (progType === 'mainhand') progType = item.all['twohanded'] === "true" ? "mainhand_2h" : "mainhand_1h";
        const rawBaseIP = parseFloat(item.all['itempower']) || 0;
        const escalatingIP = rawBaseIP + (enchantLevel * 100);
        const activeEnchant = enchantLevel > 0 ? item.enchantments.find(e => parseInt(e.level) === enchantLevel) : null;
        const logicalId = enchantLevel > 0 ? `${item.id}@${enchantLevel}` : item.id;
        const displayMainName = nameMap[item.id] ? nameMap[item.id].replace(/^T\d\s*/i, '') : formatCopyName(item.id).replace(/^\d\s*/, '');
        const itemSpells = item.resolvedSpells || [];
        const groupedSpells = {};
        itemSpells.forEach(s => {
            const slot = s.slot || 'Unknown';
            if (!groupedSpells[slot]) groupedSpells[slot] = [];
            groupedSpells[slot].push(s);
        });
        document.getElementById('details').innerHTML = `
            <button class="copy-btn tiny-copy" onclick="copyToClipboard('${item.id}', this)">UID</button>
            <div class="tab-container">
                <button class="tab-btn ${enchantLevel === 0 ? 'active' : ''}" onclick="view('${item.id}', null, 0)">Flat</button>
                ${(item.enchantments || []).map(e => `<button class="tab-btn ${enchantLevel === parseInt(e.level) ? 'active' : ''}" onclick="view('${item.id}', null, ${e.level})">.${e.level}</button>`).join('')}
            </div>
            <div class="content-header">
                <div style="display:flex; gap:20px; align-items:flex-start;">
                    <img class="item-icon-large" src="https://render.albiononline.com/v1/item/${logicalId}.png">
                    <div style="flex:1;">
                        <div class="title-row">
                            <button class="copy-btn" onclick="copyToClipboard('${formatCopyName(logicalId).replace(/'/g, "\\'")}', this)">Copy</button>
                            <h2>${displayMainName}${enchantLevel > 0 ? ' .' + enchantLevel : ''}</h2>
                        </div>
                        <div class="ip-controls">
                            <span>Slot: <b>${item.slotType || 'None'}</b></span><span class="ip-divider">|</span>
                            <span>Base IP: <b>${escalatingIP}</b></span><span class="ip-divider">|</span>
                            <span>Current IP: <input type="number" id="ipOverride" class="ip-input" placeholder="${escalatingIP}" value="${overrideIP !== null ? overrideIP : ''}"></span>
                        </div>
                    </div>
                </div>
            </div>
            ${variations.length > 0 ? `<div style="margin-bottom: 20px;"><span class="attr-label" style="margin-bottom: 8px;">Tier Variations</span><div style="display: flex; gap: 8px; flex-wrap: wrap;">${variations.map(v => `<button class="copy-btn" style="min-width: 40px;" onclick="view('${v.id.replace(/'/g, "\\'")}')">T${v.tier}</button>`).join('')}</div></div>` : ''}
            <div id="combatStatContainer"></div>
            ${Object.keys(groupedSpells).length > 0 ? `
                <button class="collapsible" onclick="toggleCollapse(this)">Item Spells</button>
                <div class="collapsible-content" id="spellContainer"></div>` : ''}
            <h3 class="section-title" style="color: var(--accent);">Crafting Calculator (${enchantLevel > 0 ? '.' + enchantLevel : 'Flat'})</h3>
            <div class="calc-controls">
                <div class="calc-input-group"><label>Cycles</label><input type="number" id="batchInput" class="calc-input" value="${batchSize}" min="1"></div>
                <div class="calc-input-group"><label>Location</label><select id="rrrPreset" class="calc-select"><option value="0">Islands (0%)</option><option value="15.2" selected>Base (15.2%)</option><option value="21.8">Bonus (21.8%)</option><option value="24.8">City (24.8%)</option><option value="27.5">Bonus (27.5%)</option><option value="30">City +Bonus (30%)</option><option value="34.6">City +2Bonus (34.6%)</option></select></div>
                <div class="calc-input-group" style="padding-top:15px;"><label style="cursor:pointer; display:flex; align-items:center; gap:8px;"><input type="checkbox" id="focusToggle" style="width:18px;height:18px;"><span style="color:#3fb950;font-weight:bold;font-size:0.85rem;">Focus</span></label></div>
                <div class="calc-input-group"><label>Return %</label><input type="number" id="rrrInput" class="calc-input" value="${returnRate}" step="0.1"></div>
            </div>
            <div id="yieldDisplay" style="font-size:0.75rem;color:var(--blue-grey);margin-bottom:10px;font-weight:bold;"></div>
            <div class="cosy-block"><table class="calc-table"><thead><tr><th>Resource</th><th>Price/ea</th><th>Raw</th><th id="netLeftHeader">Net</th><th>Total Cost</th></tr></thead><tbody id="calcTableBody"></tbody></table><div class="grand-total">Total Silver: <span id="grandTotalValue" class="grand-val">0</span></div><div class="grand-total" style="border-top: none; padding-top: 5px; margin-top: 0; font-size: 0.95rem; color: #8b949e;">Unit Cost: <span id="unitCostValue" class="grand-val" style="color: var(--silver);">0</span></div></div>
            <h3 class="section-title">${enchantLevel > 0 ? 'Enchanted' : 'Base'} Requirements</h3>
            <div class="enchant-methods-wrapper">
                ${(activeEnchant ? activeEnchant.craftingMethods : item.baseMethods).map((method, idx) => `<div class="cosy-block"><div class="method-label">CRAFT ${method.amountCrafted > 1 ? `(Yields ${method.amountCrafted})` : ''}</div>${method.resources.map(r => renderRecipeRow(r)).join('')}</div>`).join('')}
            </div>
            <button class="collapsible" onclick="toggleCollapse(this)">All XML Attributes</button>
            <div class="collapsible-content"><div class="attr-grid">${Object.keys(item.all).sort().map(k => `<div class="attr-box"><span class="attr-label">${k}</span><span class="attr-val">${item.all[k]}</span></div>`).join('')}</div></div>
        `;
        const updateStats = (val) => {
            const currentIP = (val !== null && val !== "") ? parseFloat(val) : escalatingIP;
            const combatKeys = Object.keys(statToProgressionMap);
            const keysToProcess = [...new Set([...Object.keys(item.all), 'hitpointsmax'])].filter(k => combatKeys.includes(k.toLowerCase()));
            const template = progressionLookup[progType] || {};
            
            // PRE-CALCULATE CURRENT ABILITY POWER FOR SPELL SCALING
            const baseAPStat = parseFloat(item.all['abilitypower']) || 100;
            const apProgFactor = parseFloat(template['abilitypowerprogression']) || 1.0825;
            const currentAP = baseAPStat * Math.pow(apProgFactor, currentIP / 100);

            const combatHtml = keysToProcess.map(k => {
                let baseVal = parseFloat(item.all[k]) || 0;
                const factor = parseFloat(template[statToProgressionMap[k.toLowerCase()]]) || 1.0825; 
                let finalVal, formulaText;
                const isHP = k.toLowerCase() === 'hitpointsmax';
                if (isHP && (item.slotType === 'armor' || item.slotType === 'head' || item.slotType === 'shoes')) {
                    const offset = (item.slotType === 'head' || item.slotType === 'shoes') ? 300 : 600;
                    finalVal = (baseVal + offset) * Math.pow(factor, currentIP / 100) - offset;
                    formulaText = `(${baseVal} + ${offset}) * ${factor}^(${currentIP}/100) - ${offset}`;
                } else {
                    finalVal = baseVal * Math.pow(factor, currentIP / 100);
                    formulaText = `${baseVal} * ${factor}^(${currentIP}/100)`;
                }
                return finalVal > 0 ? `<div class="attr-box combat-box"><span class="attr-label combat-label">${k}</span><span class="attr-val">${finalVal.toFixed(2)}</span><div class="formula-info">${formulaText}</div></div>` : '';
            }).join('');
            document.getElementById('combatStatContainer').innerHTML = `<h3 class="section-title" style="color:var(--combat);">Calculated Combat Stats</h3><div class="attr-grid">${combatHtml || 'No combat stats'}</div>`;

            // UPDATE SPELL VALUES USING (Base * currentAP / 100)
            const spellContainer = document.getElementById('spellContainer');
            if (spellContainer) {
                spellContainer.innerHTML = Object.keys(groupedSpells).map(slotName => `
                    <h4 style="color: #fff; margin: 20px 0 10px 0; border-bottom: 1px dashed var(--border); padding-bottom: 5px; text-transform: uppercase; font-size: 0.9rem;">Slot: ${slotName}</h4>
                    <div class="spell-grid">
                        ${groupedSpells[slotName].map(s => {
                            const data = spellsMap[s.id];
                            if (!data) return `<div class="attr-box"><span class="attr-label">Slot ${s.slot}</span><span class="attr-val">${s.id}</span></div>`;
                            return `
                                <div class="attr-box">
                                    <div style="display:flex; gap:10px; align-items:center; margin-bottom:5px;">
                                        <img src="https://render.albiononline.com/v1/spell/${data.sprite}.png" class="res-icon" onerror="this.style.display='none'">
                                        <span class="attr-val" style="color:#fff">${s.id} <span class="spell-tag">${data.type}</span></span>
                                    </div>
                                    <span class="attr-label">Tag: ${s.tag || 'N/A'}</span>
                                    <div class="formula-info" style="margin-top:5px; color:var(--text); font-size:0.75rem;">${formatSpellDesc(data.desc)}</div>
                                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; font-size: 0.7rem; color: var(--blue-grey);">
                                        ${data.recast ? `<div>Recast: <b style="color:#fff">${data.recast}s</b></div>` : ''}
                                        ${data.energy ? `<div>Energy: <b style="color:#fff">${data.energy}</b></div>` : ''}
                                        ${data.cast ? `<div>Cast: <b style="color:#fff">${data.cast}s</b></div>` : ''}
                                        ${data.hit ? `<div>Hit Delay: <b style="color:#fff">${data.hit}s</b></div>` : ''}
                                        ${data.stand ? `<div>Stand: <b style="color:#fff">${data.stand}s</b></div>` : ''}
                                    </div>
                                    ${data.changes && data.changes.length > 0 ? `
                                        <div style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 5px;">
                                            ${data.changes.map(c => {
                                                const baseVal = parseFloat(c.change) || 0;
                                                const scaledVal = baseVal * (currentAP / 100);
                                                let color = 'var(--combat)';
                                                if (c.attr === 'health' && baseVal > 0) color = '#3fb950';
                                                if (c.attr === 'shield') color = 'var(--tier)';
                                                return `
                                                    <div class="spell-stat-line">
                                                        <span class="spell-stat-label">${c.target || ''} ${c.attr || ''} ${c.type ? `(${c.type})` : ''}</span>
                                                        <span class="spell-stat-val" style="color:${color}">${scaledVal.toFixed(2)}</span>
                                                    </div>
                                                    <div class="formula-info" style="text-align:right; font-size:0.6rem;">${baseVal} * (${currentAP.toFixed(2)} / 100)</div>
                                                `;
                                            }).join('')}
                                        </div>` : ''}
                                </div>`;
                        }).join('')}
                    </div>`).join('');
            }
        };
        updateStats(overrideIP);
        const rrrPreset = document.getElementById('rrrPreset'), focusToggle = document.getElementById('focusToggle'), batchInput = document.getElementById('batchInput');
        const updateFinalRR = () => {
            const base = parseFloat(rrrPreset.value);
            returnRate = focusToggle.checked ? {0:39.3, 15.2:43.5, 21.8:46.5, 24.8:47.9, 27.5:49.2, 30:50.4, 34.6:52.8}[base] || base : base;
            rrrInput.value = returnRate;
            actualizeCalculator(item, activeEnchant);
        };
        actualizeCalculator(item, activeEnchant);
        document.getElementById('ipOverride').addEventListener('input', (e) => updateStats(e.target.value));
        batchInput.addEventListener('input', (e) => { batchSize = parseInt(e.target.value) || 1; actualizeCalculator(item, activeEnchant); });
        rrrPreset.addEventListener('change', updateFinalRR);
        focusToggle.addEventListener('change', updateFinalRR);
    }
    function initFilters() {
        const getSet = (k) => [...new Set(items.map(i => i[k]))].sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
        document.getElementById('tierFilter').innerHTML = '<option value="all">Tier</option>' + getSet('tier').map(v => `<option value="${v}">T${v}</option>`).join('');
        document.getElementById('tagFilter').innerHTML = '<option value="all">Tag</option>' + getSet('tag').map(v => `<option value="${v}">${v}</option>`).join('');
        document.getElementById('catFilter').innerHTML = '<option value="all">Category</option>' + getSet('cat').map(v => `<option value="${v}">${v}</option>`).join('');
        updateSubFilter();
    }
    function updateSubFilter() {
        const cat = document.getElementById('catFilter').value;
        const subSet = [...new Set(items.filter(i => cat === 'all' || i.cat === cat).map(i => i.sub))].sort();
        document.getElementById('subCatFilter').innerHTML = '<option value="all">Sub-Type</option>' + subSet.map(v => `<option value="${v}">${v}</option>`).join('');
    }
    function runFilter() {
        const s = document.getElementById('search').value.toLowerCase(), t = document.getElementById('tierFilter').value, tag = document.getElementById('tagFilter').value, cat = document.getElementById('catFilter').value, sub = document.getElementById('subCatFilter').value;
        filteredItems = items.filter(i => (i.id.toLowerCase().includes(s) || (nameMap[i.id] || "").toLowerCase().includes(s)) && (t === 'all' || i.tier === t) && (tag === 'all' || i.tag === tag) && (cat === 'all' || i.cat === cat) && (sub === 'all' || i.sub === sub));
        document.getElementById('count').innerText = `Matches: ${filteredItems.length}`;
        displayedCount = 80; renderChunk();
    }
    function renderChunk() {
        listEl.innerHTML = filteredItems.slice(0, displayedCount).map(i => `<div class="item-row" onclick="view('${i.id.replace(/'/g, "\\'")}')"><span class="item-id">${nameMap[i.id] || i.id}</span><span class="item-sub">${i.cat} > ${i.sub}</span><span class="tier-tag">T${i.tier}</span></div>`).join('');
    }
    listEl.addEventListener('scroll', () => { if (listEl.scrollTop + listEl.clientHeight >= listEl.scrollHeight - 50 && displayedCount < filteredItems.length) { displayedCount += 80; renderChunk(); } });
    function toggleCollapse(el) { el.classList.toggle("active-collapse"); const c = el.nextElementSibling; c.style.display = c.style.display === "block" ? "none" : "block"; }
    document.getElementById('search').addEventListener('input', runFilter);
    document.getElementById('catFilter').addEventListener('change', () => { updateSubFilter(); runFilter(); });
    ['tierFilter','tagFilter', 'subCatFilter'].forEach(id => document.getElementById(id).addEventListener('change', runFilter));
    document.getElementById('resetBtn').addEventListener('click', () => { document.getElementById('search').value = ''; document.getElementById('tierFilter').value = 'all'; document.getElementById('tagFilter').value = 'all'; document.getElementById('catFilter').value = 'all'; updateSubFilter(); runFilter(); });
    window.addEventListener('DOMContentLoaded', async () => {
        try { const r = await fetch('items.xml'); if (r.ok) processXML(await r.text()); } catch (e) { document.getElementById('count').innerText = "Fetch failed."; }
        try { const r = await fetch('items.txt'); if (r.ok) processNames(await r.text()); } catch (e) {}
        try { const r = await fetch('spells.xml'); if (r.ok) processSpells(await r.text()); } catch (e) {}
    });
</script>
</body>
</html>
